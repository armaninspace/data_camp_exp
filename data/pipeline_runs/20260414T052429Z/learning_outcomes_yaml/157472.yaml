course_id: '157472'
course_title: Foundations of Inference in Python
learning_outcomes:
- id: LO1
  claim: Understand the relationship between sampling and statistical inference, including
    how sample choice affects conclusions.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The first syllabus chapter explicitly covers the relationship between
    samples and statistically justifiable conclusions, emphasizing the importance
    of sample choice in inference.
  citations:
  - field: syllabus[0].title
    evidence: Inferential Statistics and Sampling
  - field: syllabus[0].summary
    evidence: explore the relationship between samples and statistically justifiable
      conclusions... how the choice of a sample affects the outcome of your inference
- id: LO2
  claim: Apply a range of hypothesis tests (normality, correlation, parametric, and
    non-parametric) using Python tools such as SciPy.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second syllabus chapter and the overview both mention hands-on application
    of various hypothesis tests using Python libraries.
  citations:
  - field: syllabus[1].title
    evidence: Hypothesis Testing Toolkit
  - field: syllabus[1].summary
    evidence: applying normality tests, correlation tests, and parametric and non-parametric
      tests for sound inference... choosing the right tool for the job
  - field: overview
    evidence: You'll run these tests using SciPy, and interpret their output to use
      for decision making.
- id: LO3
  claim: Interpret and measure effect size and statistical power, and recognize the
    implications of multiple comparisons in statistical analysis.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third syllabus chapter focuses on effect size, statistical power,
    and the multiple comparisons problem, indicating students will interpret and understand
    these concepts.
  citations:
  - field: syllabus[2].title
    evidence: Effect Size
  - field: syllabus[2].summary
    evidence: measure and interpret effect size... encounter the multiple comparisons
      problem, and explore the power of a test in depth
- id: LO4
  claim: Use simulation-based methods (bootstrapping, permutation tests) and meta-analysis
    to combine and analyze data from multiple studies.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The fourth syllabus chapter describes hands-on work with bootstrapping,
    permutation tests, and meta-analysis, indicating procedural application.
  citations:
  - field: syllabus[3].title
    evidence: Simulation, Randomization, and Meta-Analysis
  - field: syllabus[3].summary
    evidence: look at bootstrapping, permutation tests, and methods of combining evidence
      from p-values... learn all about combining results from multiple studies
- id: LO5
  claim: Interpret statistical test outputs to make principled, data-driven decisions.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview and summary emphasize interpreting test outputs for decision-making,
    suggesting students will be able to use results to inform decisions.
  citations:
  - field: overview
    evidence: interpret their output to use for decision making
  - field: summary
    evidence: making sound conclusions based on data
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not specify the depth of mathematical/statistical theory covered,
    nor does it detail the complexity of real-world datasets used.
  - There is no explicit mention of assessment types or the extent of independent
    project work.
  - While the course claims to go 'well beyond graphs and summary statistics,' the
