course_id: '182495'
course_title: Baseball Data Visualization in Power BI
learning_outcomes:
- id: LO1
  claim: Identify and interpret key features of Lahman's baseball dataset.
  knowledge_type: factual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.75
  reasoning: The first chapter introduces students to Lahman's dataset and involves
    examining baseball statistics, indicating students will gain familiarity with
    the dataset and basic interpretation skills.
  citations:
  - field: syllabus[0].summary
    evidence: you'll get your first look at Lahman's baseball dataset, which you’ll
      use throughout the course and start working for a baseball historian. You will
      help the historian look into common opinions regarding baseball batting statistics
      and even examine a team's performance in one specific season.
- id: LO2
  claim: Create and customize scatter plots, tornado charts, and gauges in Power BI
    to visualize baseball data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview and summary repeatedly mention creating specific types of
    charts in Power BI, indicating students will learn to apply Power BI features
    to visualize data.
  citations:
  - field: overview
    evidence: Create scatter plots, tornado charts, and gauges to bring baseball insights
      alive.
  - field: summary
    evidence: Create scatter plots, tornado charts, and gauges to bring baseball insights
      alive.
- id: LO3
  claim: Analyze baseball batting statistics and team performance using Power BI visualizations.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: Chapters 1 and 2 involve examining batting statistics, team performance,
    and player performance, suggesting students will analyze data using visualizations.
  citations:
  - field: syllabus[0].summary
    evidence: look into common opinions regarding baseball batting statistics and
      even examine a team's performance in one specific season.
  - field: syllabus[1].summary
    evidence: focusing on the performance of Shortstops during the 2019 season. You
      will also examine batting averages for different teams and players and get introduced
      to the Mendoza Line!
- id: LO4
  claim: Interpret trends in offensive productivity and power hitting in baseball
    over time using data visualizations.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: Chapter 3 focuses on analyzing how offensive productivity has changed
