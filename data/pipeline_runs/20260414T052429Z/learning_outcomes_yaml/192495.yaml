course_id: '192495'
course_title: Introduction to Docker
learning_outcomes:
- id: LO1
  claim: Understand and use basic Docker CLI commands to manage containers and images.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus explicitly states that students will start and stop containers,
    clean environments, and debug issues using the Docker CLI. This indicates hands-on
    procedural knowledge and the ability to apply basic Docker commands.
  citations:
  - field: syllabus[0].title
    evidence: Using Docker Containers
  - field: syllabus[0].summary
    evidence: You'll go from starting and stopping your first container to seeing
      how to clean your environment by removing all containers and images. You'll
      see how to debug issues by running commands inside a container or executing
      bash commands in a container interactively. All of this is done using the Docker
      Command Line Interface.
