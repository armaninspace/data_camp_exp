course_id: '205170'
course_title: Building Dashboards with shinydashboard
learning_outcomes:
- id: LO1
  claim: Understand the structure and components of a shinyApp in R.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.75
  reasoning: The first syllabus chapter focuses on understanding what a shinyApp is
    and what goes into it, culminating in the ability to render a shinyApp.
  citations:
  - field: syllabus[0].title
    evidence: ShinyApps
  - field: syllabus[0].summary
    evidence: you will learn what a shinyApp is, and learn what goes into a shinyApp.
      At the end of this chapter, you will be able to render your own shinyApp.
- id: LO2
  claim: Apply the basics of shinydashboard to create dashboards with customizable
    layouts.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second chapter covers the transition from shinyApp to shinydashboard,
    including wire-framing and positioning outputs and inputs.
  citations:
  - field: syllabus[1].title
    evidence: Basics of a shinydashboard
  - field: syllabus[1].summary
    evidence: learn to carry out some simple wire-framing for a dashboard, during
      which you can decide where to position outputs and inputs in the dashboard.
- id: LO3
  claim: Integrate interactive elements such as plots, geospatial maps, and tables
    into dashboards.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third chapter explicitly states that students will learn to insert
    interactive elements, including graphs, geospatial maps, and tables.
  citations:
  - field: syllabus[2].title
    evidence: Interactive plots and geospatial maps
  - field: syllabus[2].summary
    evidence: enhance your shinydashboard by inserting interactive elements. These
      will include graphs, geospatial maps, and tables that dashboard users can interact
      with in real-time.
- id: LO4
  claim: Modify dashboard design elements and apply basic UI/UX principles using CSS
    and shinydashboard features.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The fourth chapter covers changing design elements, modifying box dimensions,
    and applying UI/UX principles, including the use of CSS.
  citations:
  - field: syllabus[3].title
    evidence: Adding design elements and improving UI/UX
  - field: syllabus[3].summary
    evidence: add design elements... change background colors, modify box dimensions...
      discuss some basic principles of good UI/UX... show how statuses and CSS formatting
      can be utilized.
- id: LO5
  claim: Recognize the differences between static reports and dynamic, interactive
    dashboards.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.75
  reasoning: The overview discusses the distinction between static reports and dynamic
    dashboards, emphasizing interactivity and real-time data.
  citations:
  - field: overview
    evidence: While reports can provide you with a snapshot of a situation, a dashboard
      is not only dynamic, meaning that data can be updated in real time but also
      interactive.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not explicitly cover advanced dashboard deployment, user authentication,
    or integration with external data sources.
  - There is no explicit mention of assessment or project-based synthesis, so mastery
    at higher Bloom's or SOLO levels is not supported.
  - UI/UX coverage is described as 'basic principles,' so depth in this area is likely
    limited.
