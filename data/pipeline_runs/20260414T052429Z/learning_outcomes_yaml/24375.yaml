course_id: '24375'
course_title: Machine Learning with scikit-learn
learning_outcomes:
- id: LO1
  claim: Understand and apply supervised learning techniques for classification problems
    using scikit-learn.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview explicitly states that students will be introduced to classification
    problems and learn to solve them using supervised learning techniques, applying
    these to a political dataset.
  citations:
  - field: overview
    evidence: In this chapter, you will be introduced to classification problems and
      learn how to solve them using supervised learning techniques. And you’ll apply
      what you learn to a political dataset, where you classify the party affiliation
      of United States congressmen based on their voting records.
- id: LO2
  claim: Understand and apply regression techniques to predict continuous outcomes
    using scikit-learn.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview describes learning about fundamental concepts in regression
    and applying them to predict life expectancy using Gapminder data.
  citations:
  - field: overview
    evidence: Regression is best suited to solving such problems. You will learn about
      fundamental concepts in regression and apply them to predict the life expectancy
      in a given country using Gapminder data.
- id: LO3
  claim: Evaluate and optimize model performance using metrics and hyperparameter
    tuning in scikit-learn.
  knowledge_type: procedural
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview mentions learning about metrics to assess model performance
    and optimizing models using hyperparameter tuning.
  citations:
  - field: overview
    evidence: In this chapter, you will learn about some of the other metrics available
      in scikit-learn that will allow you to assess your model's performance in a
      more nuanced manner. Next, learn to optimize your classification and regression
      models using hyperparameter tuning.
- id: LO4
  claim: Use preprocessing techniques and pipelines in scikit-learn to enhance and
    streamline machine learning workflows.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview states that students will be introduced to preprocessing
    techniques and pipelines, and will learn to chain transformers and estimators
    together.
  citations:
  - field: overview
    evidence: This chapter introduces pipelines, and how scikit-learn allows for transformers
      and estimators to be chained together and used as a single unit. Preprocessing
      techniques will be introduced as a way to enhance model performance, and pipelines
      will tie together concepts from previous chapters.
