course_id: '24396'
course_title: Data Manipulation with dplyr
learning_outcomes:
- id: LO1
  claim: Recall and use fundamental dplyr verbs (select, filter, arrange, mutate)
    to transform data in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The first syllabus chapter explicitly states that students will learn
    and use select, filter, arrange, and mutate to modify datasets and answer questions
    about the data.
  citations:
  - field: syllabus[0].title
    evidence: Transforming Data with dplyr
  - field: syllabus[0].summary
    evidence: Learn verbs you can use to transform your data, including select, filter,
      arrange, and mutate. You'll use these functions to modify the counties dataset
      to view particular observations and answer questions about the data.
- id: LO2
  claim: Summarize and aggregate data using dplyr functions such as count, group_by,
    summarize, ungroup, and slice_min/slice_max.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The second syllabus chapter focuses on aggregation and summarization
    using specific dplyr functions, indicating students will be able to perform these
    operations.
  citations:
  - field: syllabus[1].title
    evidence: Aggregating Data
  - field: syllabus[1].summary
    evidence: You'll learn a number of functions you can use to take many observations
      in your data and summarize them, including count, group_by, summarize, ungroup,
      and slice_min/slice_max.
- id: LO3
  claim: Apply advanced selection and transformation techniques in dplyr, including
    select helpers and renaming columns.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The third syllabus chapter introduces advanced selection (select helpers)
    and renaming, suggesting students will be able to use these features.
  citations:
  - field: syllabus[2].title
    evidence: Selecting and Transforming Data
  - field: syllabus[2].summary
    evidence: Learn advanced methods to select and transform columns. Also, learn
      about select helpers, which are functions that specify criteria for columns
      you want to choose, as well as the rename verb.
- id: LO4
  claim: Use grouped mutates and window functions to answer more complex questions
    about grouped data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The case study chapter mentions grouped mutates and window functions,
    indicating students will practice these techniques.
  citations:
  - field: syllabus[3].title
    evidence: 'Case Study: The babynames Dataset'
  - field: syllabus[3].summary
    evidence: Learn how to use grouped mutates and window functions to ask and answer
      more complex questions about your data.
- id: LO5
  claim: Create basic data visualizations using ggplot2 in combination with dplyr-transformed
    data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The case study chapter states students will use dplyr and ggplot2 to
    make graphs, suggesting basic visualization skills are developed.
  citations:
  - field: syllabus[3].summary
    evidence: And use a combination of dplyr and ggplot2 to make interesting graphs
      to further explore your data.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course appears to focus on procedural knowledge and application, with little
    evidence for higher-order skills such as analysis, evaluation, or creation.
  - There is no explicit mention of metacognitive strategies or conceptual understanding
    beyond procedural use of dplyr and ggplot2.
  - The depth of data visualization skills is unclear; only basic graph creation is
