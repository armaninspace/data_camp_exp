  - field: syllabus[1].summary
    evidence: Learn in detail about different types of databases data engineers use,
      how parallel computing is a cornerstone of the data engineer's toolkit, and
      how to schedule data processing jobs using scheduling frameworks.
- id: LO3
  claim: Explain the ETL (Extract, Transform, Load) process and its role in preparing
