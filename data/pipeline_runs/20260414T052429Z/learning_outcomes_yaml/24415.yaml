  claim: Distinguish between the roles of data engineers and data scientists, and
    identify key tools used in data engineering.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter explicitly covers the differences between data engineers
    and data scientists, as well as an overview of tools and the role of cloud technology.
  citations:
  - field: syllabus[0].title
    evidence: Introduction to Data Engineering
  - field: syllabus[0].summary
    evidence: Explore the differences between a data engineer and a data scientist,
      get an overview of the various tools data engineers use and expand your understanding
      of how cloud technology plays a role in data engineering.
- id: LO2
  claim: Describe and explain the use of different types of databases, parallel computing,
