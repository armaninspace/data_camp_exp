course_id: '24419'
course_title: Introduction to Natural Language Processing in Python
learning_outcomes:
- id: '1'
  claim: Identify and apply regular expressions and word tokenization techniques to
    parse text, including handling non-English text.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn and use regular
    expressions and word tokenization, including for non-English text and more difficult
    tokenization scenarios.
  citations:
  - field: syllabus[0].title
    evidence: Regular expressions & word tokenization
  - field: syllabus[0].summary
    evidence: introduce some basic NLP concepts, such as word tokenization and regular
      expressions to help parse text. You'll also learn how to handle non-English
      text and more difficult tokenization you might find.
- id: '2'
  claim: Use basic NLP models to identify topics in text using bag-of-words and Tf-idf
    methods with NLTK and Gensim.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus describes applying topic identification using bag-of-words
    and Tf-idf, and experimenting with NLTK and Gensim libraries.
  citations:
  - field: syllabus[1].title
    evidence: Simple topic identification
  - field: syllabus[1].summary
    evidence: 'identify topics from texts based on term frequencies. You''ll experiment
      and compare two simple methods: bag-of-words and Tf-idf using NLTK, and a new
      library Gensim.'
- id: '3'
  claim: Identify named entities (such as people, places, and organizations) in English
    and non-English texts using pre-trained models and libraries like polyglot and
    spaCy.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus specifies learning to identify named entities using pre-trained
    models and libraries, including for non-English text.
  citations:
  - field: syllabus[2].title
    evidence: Named-entity recognition
  - field: syllabus[2].summary
    evidence: identify the who, what, and where of your texts using pre-trained models
      on English and non-English text. You'll also learn how to use some new libraries,
      polyglot and spaCy, to add to your NLP toolbox.
- id: '4'
  claim: Build a basic supervised machine learning classifier to detect fake news
    articles by selecting features and testing classification ideas.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus describes applying supervised machine learning to build
    a fake news detector, including feature selection and testing classification ideas.
  citations:
  - field: syllabus[3].title
    evidence: Building a "fake news" classifier
  - field: syllabus[3].summary
    evidence: apply the basics of what you've learned along with some supervised machine
      learning to build a "fake news" detector. You'll begin by learning the basics
      of supervised machine learning, and then move forward by choosing a few important
      features and testing ideas to identify and classify fake news articles.
