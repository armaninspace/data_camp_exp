- id: '4'
  claim: Create and use temporary tables in SQL to store and manipulate intermediate
    results.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.7
  reasoning: The second and third chapters mention creating and using temporary tables
