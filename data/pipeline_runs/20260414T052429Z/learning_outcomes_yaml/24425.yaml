  claim: Identify tables and relationships in a relational database using SQL.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first syllabus chapter focuses on exploring a database by identifying
    tables and foreign keys, and understanding how tables are related.
  citations:
  - field: syllabus[0].title
