course_id: '24427'
course_title: Streamlined Data Ingestion with pandas
learning_outcomes:
- id: LO1
  claim: Successfully import data from flat files (e.g., CSV) using pandas, including
    selecting specific data, handling data types, and managing errors.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will practice using pandas
    to get specific data from flat files, wrangle data types, and handle errors. This
    indicates procedural knowledge and application-level skills.
  citations:
  - field: syllabus[0].title
    evidence: Importing Data from Flat Files
  - field: syllabus[0].summary
    evidence: Practice using pandas to get just the data you want from flat files,
      learn how to wrangle data types and handle errors, and look into some U.S. tax
      data along the way.
- id: LO2
  claim: Automate and customize data imports from Excel files using pandas, including
    partial imports and correct handling of boolean and datetime data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus describes automating imports from Excel, importing parts
    of workbooks, and ensuring correct data types, which are procedural and application-level
    skills.
  citations:
  - field: syllabus[1].title
    evidence: Importing Data From Excel Files
  - field: syllabus[1].summary
    evidence: Automate data imports from that staple of office life, Excel files.
      Import part or all of a workbook and ensure boolean and datetime data are properly
      loaded, all while learning about how other people are learning to code.
- id: LO3
  claim: Import data from SQL databases using pandas, utilizing basic SQL queries
    including WHERE clauses, aggregate functions, and joins.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus mentions combining pandas with SQL, specifically referencing
