course_id: '24428'
course_title: Working with Dates and Times in Python
learning_outcomes:
- id: '1'
  claim: Understand and perform basic date operations in Python, including creating
    and formatting date objects.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The first chapter focuses on working with date objects, understanding
    how Python handles dates, performing common date operations, and formatting dates
    correctly.
  citations:
  - field: syllabus[0].title
    evidence: Dates and Calendars
  - field: syllabus[0].summary
    evidence: you'll learn how to work with date objects in Python, starting with
      the dates of every hurricane to hit Florida since 1950. You'll learn how Python
      handles dates, common date operations, and the right way to format dates to
      avoid confusion.
- id: '2'
  claim: Parse, analyze, and manipulate combined date and time data in Python, including
    calculating durations and identifying peak times.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The second chapter emphasizes parsing dates and times from text, analyzing
    peak trip times, and calculating ride durations, indicating practical application
    of combined date-time data.
  citations:
  - field: syllabus[1].title
    evidence: Combining Dates and Times
  - field: syllabus[1].summary
    evidence: you'll practice working with dates and times together. You'll parse
      dates and times from text, analyze peak trip times, calculate ride durations,
      and more.
- id: '3'
  claim: Handle time zones and daylight saving time in Python, including comparing
    times across zones and managing DST transitions using the dateutil library.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The third chapter covers time zones, daylight saving, comparing clocks
    globally, handling DST transitions, and using the dateutil library for timezone
    data.
  citations:
  - field: syllabus[2].title
    evidence: Time Zones and Daylight Saving
  - field: syllabus[2].summary
    evidence: you'll learn how to compare clocks around the world, how to gracefully
      handle "spring forward" and "fall back," and how to get up-to-date timezone
      data from the dateutil library.
- id: '4'
  claim: Apply date and time operations in Pandas, including grouping and plotting
    time-based data for deeper analysis.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The final chapter focuses on transferring Python date/time skills to
    Pandas, with emphasis on grouping and plotting results by time for data analysis.
  citations:
  - field: syllabus[3].title
    evidence: 'Easy and Powerful: Dates and Times in Pandas'
  - field: syllabus[3].summary
    evidence: you'll cover powerful Pandas operations, such as grouping and plotting
      results by time.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
