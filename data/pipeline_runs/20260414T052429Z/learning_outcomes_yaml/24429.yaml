course_id: '24429'
course_title: Intermediate Data Visualization with ggplot2
learning_outcomes:
- id: '1'
  claim: Apply statistical methods, including linear models and descriptive/inferential
    statistics, within ggplot2 visualizations.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will progress from simply
    plotting data to applying a variety of statistical methods, including linear models
    and descriptive/inferential statistics, using ggplot2.
  citations:
  - field: syllabus[0].title
    evidence: Statistics
  - field: syllabus[0].summary
    evidence: progress from simply plotting data to applying a variety of statistical
      methods. These include a variety of linear models, descriptive and inferential
      statistics (mean, standard deviation and confidence intervals) and custom functions.
- id: '2'
  claim: Effectively use coordinate system layers in ggplot2 to visualize specialized
    data types such as lognormal datasets, variables with units, and periodic data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The Coordinates chapter summary specifies learning to use coordinate
    layers to visualize specific data types, indicating procedural application.
  citations:
  - field: syllabus[1].title
    evidence: Coordinates
  - field: syllabus[1].summary
    evidence: look at the various ways of effectively using these layers, so you can
      clearly visualize lognormal datasets, variables with units, and periodic data.
- id: '3'
  claim: Create and customize faceted plots in ggplot2, including arranging facets
    in grids and providing custom labels.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The Facets chapter summary describes learning to split plots into multiple
    panes, arrange them in grids, and provide custom labeling, which are procedural
    skills.
  citations:
  - field: syllabus[2].title
    evidence: Facets
  - field: syllabus[2].summary
    evidence: learn how to wrap facets and arrange them in a grid, as well as providing
      custom labeling.
- id: '4'
  claim: Identify and avoid common pitfalls in data visualization by evaluating discouraged
    plot types such as heat maps, pie charts, and dynamite plots.
  knowledge_type: conceptual
  process_level: evaluate
  dok_level: 3
  solo_level: relational
  confidence: 0.8
  reasoning: The Best Practices chapter focuses on reviewing commonly discouraged
    plot types and learning their pitfalls, which involves evaluation and conceptual
    understanding.
  citations:
  - field: syllabus[3].title
    evidence: Best Practices
  - field: syllabus[3].summary
    evidence: review three plot types that are commonly discouraged... learn the pitfalls
      with these plots and how to avoid making these mistakes yourself.
