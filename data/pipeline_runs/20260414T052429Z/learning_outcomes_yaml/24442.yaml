course_id: '24442'
course_title: Image Processing in Python
learning_outcomes:
- id: LO1
  claim: Understand and apply basic image processing operations such as converting
    RGB images to grayscale, extracting data, obtaining histograms, and separating
    objects from the background using NumPy and scikit-image.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will process images, convert
    RGB to grayscale, extract data, obtain histograms, and separate objects from the
    background using NumPy and scikit-image. These are foundational image processing
    tasks requiring procedural knowledge and application.
  citations:
  - field: syllabus[0].summary
    evidence: Jump into digital image structures and learn to process them! Extract
      data, transform and analyze images using NumPy and Scikit-image. With just a
      few lines of code, you will convert RGB images to grayscale, get data from them,
      obtain histograms containing very useful information, and separate objects from
      the background!
- id: LO2
  claim: Apply filters and transformations such as edge detection, contrast enhancement,
    image enlargement, and morphological operations to images.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus details the use of edge detection filters, contrast enhancement,
