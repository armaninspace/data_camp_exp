course_id: '24451'
course_title: 'Supervised Learning in R: Regression'
learning_outcomes:
- id: LO1
  claim: Explain the concept of regression and the fundamentals of linear regression
    modeling.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The first chapter introduces regression from a machine learning perspective
    and covers the basics of linear regression, including fitting models and making
    predictions.
  citations:
  - field: syllabus[0].title
    evidence: What is Regression?
  - field: syllabus[0].summary
    evidence: 'We will present the fundamental regression method: linear regression.
      We will show how to fit a linear regression model and to make predictions from
      the model.'
- id: LO2
  claim: Apply and evaluate regression models using graphical and metric-based approaches.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second chapter focuses on evaluating regression models, including
    graphical evaluation and using two basic metrics, as well as training models for
    generalization.
  citations:
  - field: syllabus[1].title
    evidence: Training and Evaluating Regression Models
  - field: syllabus[1].summary
    evidence: We will review evaluating a model graphically, and look at two basic
      metrics for regression models. We will also learn how to train a model that
      will perform well in the wild, not just on training data.
- id: LO3
  claim: Identify and address common modeling issues such as categorical inputs, variable
    interactions, and data transformations.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third chapter discusses modeling issues including categorical variables,
    interactions, and transformations, and the importance of understanding which methods
    handle these issues.
  citations:
  - field: syllabus[2].title
    evidence: Issues to Consider
  - field: syllabus[2].summary
    evidence: 'We will look at some other modeling issues: modeling with categorical
      inputs, interactions between variables, and when you might consider transforming
      inputs and outputs before modeling.'
- id: LO4
  claim: Describe and implement regression techniques for non-linear responses, including
    generalized additive models.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The fourth chapter covers techniques for modeling non-linear responses,
    such as predicting probabilities, counts, and using models with non-linear but
    additive relationships.
  citations:
  - field: syllabus[3].title
    evidence: Dealing with Non-Linear Responses
  - field: syllabus[3].summary
    evidence: We will begin to look at techniques for modeling situations that don't
      meet the assumptions of linearity. This includes predicting probabilities and
      frequencies (values bounded between 0 and 1); predicting counts (nonnegative
      integer values, and associated rates); and responses that have a non-linear
      but additive relationship to the inputs.
- id: LO5
  claim: Explain and apply tree-based regression methods, including random forests
    and xgboost, for modeling complex relationships.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The final chapter introduces tree-based methods, including ensembles
    of decision trees, random forests, and xgboost, for regression tasks that do not
    assume linearity or additivity.
  citations:
  - field: syllabus[4].title
    evidence: Tree-Based Methods
  - field: syllabus[4].summary
    evidence: These algorithms are tree-based methods that work by combining ensembles
      of decision trees that are learned from the training data.
  - field: summary
    evidence: You will learn how to predict future events using linear regression,
      generalized additive models, random forests, and xgboost.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not specify the depth of coding or implementation in R, nor does
    it detail assessment types or the extent of hands-on practice.
  - There is no explicit mention of advanced evaluation metrics, hyperparameter tuning,
    or model interpretation techniques.
  - The course does not address ethical considerations or real-world deployment of
    models.
