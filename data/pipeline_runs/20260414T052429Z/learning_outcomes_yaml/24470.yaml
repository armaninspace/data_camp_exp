  citations:
  - field: syllabus[2].title
    evidence: Groupwise Operations
  - field: syllabus[2].summary
    evidence: introduces data.table's by argument that lets you perform computations
      by groups. By the end of this chapter, you will master the concise DT[i, j,
      by] syntax of data.table.
- id: LO4
  claim: Modify data.tables in place using reference semantics for efficient data
