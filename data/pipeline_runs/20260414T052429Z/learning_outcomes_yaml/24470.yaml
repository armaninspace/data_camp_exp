course_id: '24470'
course_title: Data Manipulation with data.table in R
learning_outcomes:
- id: LO1
  claim: Understand and apply the use of data.table as a replacement for data.frame,
    including filtering rows using the i argument.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will learn to use data.table
    as a drop-in replacement for data.frame and filter rows using the i argument.
    This requires understanding and applying new syntax and procedures.
  citations:
  - field: syllabus[0].title
    evidence: Introduction to data.table
  - field: syllabus[0].summary
    evidence: introduces data.tables as a drop-in replacement for data.frames and
      shows how to use data.table's i argument to filter rows.
- id: LO2
  claim: Select columns and perform computations on them using the j argument in data.table.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus describes learning to select columns and perform computations
    using the j argument, which involves applying specific syntax and operations.
  citations:
  - field: syllabus[1].title
    evidence: Selecting and Computing on Columns
  - field: syllabus[1].summary
    evidence: lets you select columns and also perform computations. The syntax is
      far more convenient and flexible when compared to data.frames.
- id: LO3
  claim: Perform groupwise operations using the by argument and master the DT[i, j,
    by] syntax.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus states that students will learn to perform computations
    by groups using the by argument and master the DT[i, j, by] syntax, which is procedural
