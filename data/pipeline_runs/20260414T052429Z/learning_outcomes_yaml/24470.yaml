- id: LO5
  claim: Import and export flat files efficiently using data.table's fread() and fwrite()
    functions.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus specifies that students will learn to use fread() and fwrite()
