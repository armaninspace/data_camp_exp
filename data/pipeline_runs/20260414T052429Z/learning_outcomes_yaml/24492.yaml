course_id: '24492'
course_title: Building Recommendation Engines in Python
learning_outcomes:
- id: LO1
  claim: Explain the purpose of recommendation engines and identify suitable data
    types for their use.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first syllabus chapter focuses on understanding the problems recommendation
    engines solve and the types of data best suited for them, indicating conceptual
    understanding.
  citations:
  - field: syllabus[0].title
    evidence: Introduction to Recommendation Engines
  - field: syllabus[0].summary
    evidence: What problems are recommendation engines designed to solve and what
      data are best suited for them?
- id: LO2
  claim: Describe and implement content-based recommendation techniques using item
    attributes, including handling categorical and text data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The second chapter covers using item attributes for recommendations,
    comparing items, and generating user profiles, which involves both understanding
    and applying procedures.
  citations:
  - field: syllabus[1].title
    evidence: Content-Based Recommendations
  - field: syllabus[1].summary
    evidence: Discover how item attributes can be used to make recommendations. Create
      valuable comparisons between items with both categorical and text data. Generate
      profiles to recommend new items for users based on their past preferences.
- id: LO3
  claim: Apply collaborative filtering techniques, including user-based and item-based
    recommendations, and use k-nearest neighbors models.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The third chapter explicitly mentions learning to make user-based and
    item-based recommendations and using k-nearest neighbors, which are procedural
    skills.
  citations:
  - field: syllabus[2].title
    evidence: Collaborative Filtering
  - field: syllabus[2].summary
    evidence: Learn to make user-based and item-based recommendations—and in what
      context they should be used. Use k-nearest neighbors models to leverage the
      wisdom of the crowd and predict how someone might rate an item they haven’t
      yet encountered.
- id: LO4
  claim: Explain and apply matrix factorization techniques to address data sparsity
    in recommendation systems, and validate model predictions.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The fourth chapter covers understanding sparsity, using matrix factorization,
    exploring latent features, and validating models, which are procedural and conceptual
    skills.
  citations:
  - field: syllabus[3].title
    evidence: Matrix Factorization and Validating Your Predictions
  - field: syllabus[3].summary
    evidence: Leverage the power of matrix factorization to deal with this sparsity.
      Explore the value of latent features and use them to better understand your
      data. Finally, put the models you’ve discovered to the test by learning how
      to validate each of the approaches you’ve learned.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The syllabus provides clear chapter-level summaries, but does not specify the
    depth of implementation (e.g., whether students build models from scratch or use
    libraries).
  - There is no explicit mention of advanced evaluation metrics, deployment, or ethical
    considerations.
  - Metacognitive skills (e.g., reflecting on model choice) are not explicitly addressed.
