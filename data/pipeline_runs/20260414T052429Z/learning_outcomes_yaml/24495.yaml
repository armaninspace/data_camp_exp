course_id: '24495'
course_title: Data Visualization in Google Sheets
learning_outcomes:
- id: LO1
  claim: Understand the fundamentals of data visualization and business intelligence
    using Google Sheets.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The course overview and the first syllabus chapter emphasize foundational
    concepts in data visualization and business intelligence, including the purpose
    and use of dashboards.
  citations:
  - field: overview
    evidence: Learn the fundamentals of data visualization using Google Sheets.
  - field: syllabus[0].title
    evidence: Business Intelligence and Using Dashboards
  - field: syllabus[0].summary
    evidence: Learn about business intelligence and dashboards for analyzing information
      in todays data-driven world.
- id: LO2
  claim: Create and format column charts in Google Sheets, including using named ranges
    for user-friendly data referencing.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second syllabus chapter specifically addresses the creation and formatting
    of column charts and the use of named ranges.
  citations:
  - field: syllabus[1].title
    evidence: Efficient Column Charts
  - field: syllabus[1].summary
    evidence: Create and format a column chart to showcase data and learn a few smart
      tricks along the way. Look at using named ranges to refer to cells in your worksheet,
      making them user-friendly and easy to work with.
- id: LO3
  claim: Implement interactive dashboard controls to allow users to manipulate and
    explore data visualizations.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third syllabus chapter discusses dashboard controls and enabling
    user interaction with dashboards.
  citations:
  - field: syllabus[2].title
    evidence: Dashboard Controls
  - field: syllabus[2].summary
    evidence: A dashboard is like a control panel. Look at ways to allow a user to
      use this control panel to get different results from your dashboard.
- id: LO4
  claim: Select and use appropriate chart types (e.g., bar, histogram, scatter, sparkline,
    candlestick) for different data visualization scenarios.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview and the fourth syllabus chapter highlight learning to choose
    and use various chart types for different data situations.
  citations:
  - field: overview
    evidence: You'll start by learning how to create various common chart types, including
      bar charts, histograms, and scatter charts. You'll not only master these basic
      chart types but also delve into more advanced options such as sparkline and
      candlestick charts.
  - field: syllabus[3].title
    evidence: Other Charts for Your Dashboard
  - field: syllabus[3].summary
    evidence: Look at what types of charts to use in what situation to showcase your
      data.
- id: LO5
  claim: Apply conditional formatting rules in Google Sheets to highlight key data
    points and trends.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.75
  reasoning: The fifth syllabus chapter is dedicated to conditional formatting, including
    setting rules and observing formatting changes as data changes.
  citations:
  - field: syllabus[4].title
    evidence: Conditional Formatting
  - field: syllabus[4].summary
    evidence: Learn how to use rules based on criteria you set to format certain cells
      on your dashboard. See the formatting change as the values in the cells change.
- id: LO6
  claim: Prepare and organize data for visualization using data validation and lookup
    formulas in Google Sheets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview mentions data preparation, including data validation and
    VLookup, as key skills for targeting and organizing data for visualization.
  citations:
  - field: overview
    evidence: This course guides you through the use of Data Validation and VLookup
      formulas to precisely target specific data for charting. You'll learn how to
      organize and sift through your data to find the insights you need.
- id: LO7
  claim: Combine multiple visualizations and data into a comprehensive dashboard for
    real-world data analysis.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: relational
  confidence: 0.75
  reasoning: The overview and first syllabus chapter describe creating dashboards
    that combine plots and data, using real-world datasets.
  citations:
  - field: overview
    evidence: The final part of the course focuses on creating a comprehensive dashboard
      that combines plots and data. You'll apply the skills you've learned by using
      real-world data sets, such as information from the Olympics, shark attack records,
      and Marine Technology data from the ASX.
  - field: syllabus[0].summary
    evidence: Create a basic dashboard and master setting up your data to get the
      most out of it.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not explicitly cover advanced data analysis, statistical methods,
    or programming beyond Google Sheets features.
  - There is no explicit mention of assessment methods or depth of mastery beyond
    basic to intermediate application.
  - Metacognitive skills (e.g., reflecting on visualization choices) are not explicitly
    addressed.
