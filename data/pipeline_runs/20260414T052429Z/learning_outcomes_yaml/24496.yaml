  knowledge_type: procedural
  process_level: create
  dok_level: 3
  solo_level: relational
  confidence: 0.75
  reasoning: The second chapter focuses on building a custom and unique visualization,
    specifically mentioning dot plots to highlight and explain one aspect of a data
    story. This involves creating new visualizations tailored to communication goals.
  citations:
  - field: syllabus[1].title
    evidence: Creating a Custom and Unique Visualization
  - field: syllabus[1].summary
    evidence: In this chapter, you'll build a custom and unique visualization that
      emphasizes and explains exactly one aspect of the story you want to tell.
- id: '3'
  claim: Integrate R code, formatted text, tables, and plots into a reproducible RMarkdown
