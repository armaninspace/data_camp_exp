course_id: '24496'
course_title: Communicating with Data in the Tidyverse
learning_outcomes:
- id: '1'
  claim: Apply custom themes to ggplot2 visualizations to enhance their aesthetic
    appeal and clarity.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The first chapter explicitly states that students will 'apply a custom
    look' to a graphic, turning an ordinary plot into an aesthetically pleasing and
    unique data visualization. This requires procedural knowledge and the ability
    to apply learned techniques.
  citations:
  - field: syllabus[0].title
    evidence: Custom ggplot2 Themes
  - field: syllabus[0].summary
    evidence: You will then apply a custom look to that graphic – you'll turn an ordinary
      plot into an aesthetically pleasing and unique data visualization.
- id: '2'
  claim: Construct custom data visualizations (including dot plots) to effectively
