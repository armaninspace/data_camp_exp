course_id: '24502'
course_title: Dimensionality Reduction in Python
learning_outcomes:
- id: LO1
  claim: Understand the concept and importance of dimensionality reduction, including
    when and why to apply it.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will be introduced to the
    concept of dimensionality reduction and its importance, as well as the difference
    between feature selection and feature extraction.
  citations:
  - field: syllabus[0].summary
    evidence: You'll be introduced to the concept of dimensionality reduction and
      will learn when and why this is important. You'll learn the difference between
      feature selection and feature extraction...
- id: LO2
  claim: Apply visualization techniques, including t-SNE, to explore high-dimensional
    datasets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter summary mentions applying both feature selection and
    extraction techniques for data exploration, and specifically learning t-SNE for
    visualizing high-dimensional data.
  citations:
  - field: syllabus[0].summary
    evidence: The chapter ends with a lesson on t-SNE, a powerful feature extraction
      technique that will allow you to visualize a high-dimensional dataset.
- id: LO3
  claim: Detect and remove features with little information (e.g., low variance, many
    missing values, high correlation) to reduce dataset dimensionality.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The second chapter focuses on techniques to detect and remove features
    that add little value, such as those with low variance, many missing values, or
    high correlation.
  citations:
  - field: syllabus[1].summary
    evidence: You'll be introduced to a number of techniques to detect and remove
      features that bring little added value to the dataset. Either because they have
      little variance, too many missing values, or because they are strongly correlated
      to other features.
- id: LO4
  claim: Use model-based approaches to select features that improve predictive accuracy,
    including combining results from multiple models.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The third chapter describes using models to identify important features
    for prediction and combining advice from multiple models.
  citations:
  - field: syllabus[2].summary
    evidence: You'll learn how to let models help you find the most important features
      in a dataset for predicting a particular target feature. In the final lesson
      of this chapter, you'll combine the advice of multiple, different, models to
      decide on which features are worth keeping.
- id: LO5
  claim: Understand and apply Principal Component Analysis (PCA) for feature extraction,
    data exploration, and pre-processing, including for image compression.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The fourth chapter is a deep dive into PCA, including building intuition,
    applying it for exploration and pre-processing, and using it for image compression.
  citations:
  - field: syllabus[3].summary
    evidence: You'll build intuition on how and why this algorithm is so powerful
      and will apply it both for data exploration and data pre-processing in a modeling
      pipeline. You'll end with a cool image compression use case.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not specify the depth of mathematical understanding required for
    PCA or t-SNE.
  - There is no explicit mention of assessment types or the extent of independent
    project work.
  - The course does not detail coverage of other dimensionality reduction techniques
    beyond t-SNE and PCA.
