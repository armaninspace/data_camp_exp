course_id: '24505'
course_title: Modeling with Data in the Tidyverse
learning_outcomes:
- id: LO1
  claim: Understand foundational modeling concepts, including the general modeling
    framework and the distinction between modeling for explanation and prediction.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students are introduced to background
    theory, terminology, and the general modeling framework, as well as the difference
    between modeling for explanation and prediction.
  citations:
  - field: syllabus[0].summary
    evidence: This chapter will introduce you to some background theory and terminology
      for modeling, in particular, the general modeling framework, the difference
      between modeling for explanation and modeling for prediction, and the modeling
      problem.
- id: LO2
  claim: Perform basic exploratory data analysis as a preliminary step before formal
    modeling.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.9
  reasoning: The syllabus notes that students will start performing exploratory data
    analysis, which is a procedural skill.
  citations:
  - field: syllabus[0].summary
    evidence: you'll start performing your first exploratory data analysis, a crucial
      first step before any formal modeling.
- id: LO3
  claim: Apply basic linear regression to model an outcome variable as a function
    of a single explanatory variable, using both numerical and categorical predictors.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus describes covering basic linear regression with both numerical
    and categorical predictors, modeling a specific outcome variable.
  citations:
  - field: syllabus[1].summary
    evidence: we'll cover basic linear regression where you'll keep things simple
      and model the outcome variable y as a function of a single explanatory/ predictor
      variable x. We'll use both numerical and categorical x variables.
- id: LO4
  claim: Extend regression analysis to multiple regression, incorporating more than
    one explanatory or predictor variable.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus states that students will extend from basic to multiple
    regression, allowing for more than one predictor variable.
  citations:
  - field: syllabus[2].summary
    evidence: You will now extend basic regression to multiple regression, which allows
      for incorporation of more than one explanatory or one predictor variable in
      your models.
- id: LO5
  claim: Assess and compare models using model assessment measures to determine model
    fit and predictive accuracy.
  knowledge_type: procedural
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.9
  reasoning: The syllabus indicates students will learn to use model assessment measures
    to evaluate and select the best models, which involves analysis and comparison.
  citations:
  - field: syllabus[3].summary
    evidence: Model assessment measures allow you to assess how well an explanatory
      model "fits" a set of data or how accurate a predictive model is. Based on these
      measures, you'll learn about criteria for determining which models are "best".
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not specify the depth of mathematical/statistical theory covered,
    nor does it detail advanced modeling techniques beyond multiple regression.
  - There is no explicit mention of hands-on coding or software skills, though Tidyverse
    is referenced in the title and subjects.
  - No explicit mention of metacognitive skills or self-assessment practices.
