course_id: '24523'
course_title: Intermediate R for Finance
learning_outcomes:
- id: '1'
  claim: Understand and use date and time data types in R.
  knowledge_type: factual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.9
  reasoning: The 'Dates' chapter focuses on understanding how dates and times are
    created and used in R, but notes that it only scratches the surface.
  citations:
  - field: syllabus[0].title
    evidence: Dates
  - field: syllabus[0].summary
    evidence: This chapter will teach you enough to begin working with dates, but
      only scratches the surface of what you can do with them.
- id: '2'
  claim: Apply if statements and logical operators in R to make basic financial decisions
    (e.g., buy/sell stock).
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The 'If Statements and Operators' chapter explicitly states that students
    will learn to implement financial logic using operators and if statements, including
    creating a program to decide when to buy or sell a stock.
  citations:
  - field: syllabus[1].title
    evidence: If Statements and Operators
  - field: syllabus[1].summary
    evidence: In this chapter, you will learn all about them, and create a program
      that tells you to buy or sell a stock.
- id: '3'
  claim: Use repeat, while, and for loops in R to perform repetitive operations on
    data structures.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The 'Loops' chapter covers the use of repeat, while, and for loops for
    operations on data structures.
  citations:
  - field: syllabus[2].title
    evidence: Loops
  - field: syllabus[2].summary
    evidence: In this chapter you will learn all about repeat, while, and for loops!
- id: '4'
  claim: Use built-in functions and create custom functions in R, with an introduction
    to packages.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The 'Functions' chapter covers both using built-in functions and creating
    custom functions, as well as a brief introduction to packages.
  citations:
  - field: syllabus[3].title
    evidence: Functions
  - field: syllabus[3].summary
    evidence: In this chapter, you will learn about using built-in functions, creating
      your own unique functions, and you will finish off with a brief introduction
      to packages.
- id: '5'
  claim: Apply the family of apply functions in R to perform calculations across data
    efficiently.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The 'Apply' chapter introduces the apply functions as alternatives to
    loops for scaling calculations across data.
  citations:
  - field: syllabus[4].title
    evidence: Apply
  - field: syllabus[4].summary
    evidence: A popular alternative to loops in R are the apply functions. These are
      often more readable than loops, and are incredibly useful for scaling the data
      science workflow to perform a complicated calculation on any number of observations.
coverage_notes:
  syllabus_present: true
