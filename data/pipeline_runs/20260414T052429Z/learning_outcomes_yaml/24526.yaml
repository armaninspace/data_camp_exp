course_id: '24526'
course_title: Sentiment Analysis in Python
learning_outcomes:
- id: '1'
  claim: Understand the basic structure of a sentiment analysis problem and explore
    sentiment in movie reviews.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter explicitly states that students will learn the basic
    structure of sentiment analysis and begin exploring sentiment in movie reviews.
    This supports conceptual understanding and some application.
  citations:
  - field: syllabus[0].title
    evidence: Sentiment Analysis Nuts and Bolts
  - field: syllabus[0].summary
    evidence: In this chapter, you will learn the basic structure of a sentiment analysis
      problem and start exploring the sentiment of movie reviews.
- id: '2'
  claim: Transform text reviews into numeric features for analysis, considering basic
    complexities.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The second chapter focuses on transforming text into numeric form and
    considering some complexities, indicating procedural knowledge and application.
  citations:
  - field: syllabus[1].title
    evidence: Numeric Features from Reviews
  - field: syllabus[1].summary
    evidence: To that end, we transform the text into a numeric form and consider
      a few complexities in the process.
- id: '3'
  claim: Apply additional techniques to extract numeric features from social media
    text, such as tweets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The third chapter extends the numeric feature extraction to social media
    data and introduces other methods, supporting procedural application.
  citations:
  - field: syllabus[2].title
    evidence: 'More on Numeric Vectors: Transforming Tweets'
  - field: syllabus[2].summary
    evidence: We will cover additional complexities, especially when working with
      sentiment analysis data from social media platforms such as Twitter. We will
      also learn other ways to obtain numeric features from the text.
- id: '4'
  claim: Build and evaluate basic machine learning models (logistic regression) to
    predict sentiment from text data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The final chapter describes using logistic regression to predict sentiment
    and evaluating model performance, indicating procedural application.
  citations:
  - field: syllabus[3].title
    evidence: Let's Predict the Sentiment
  - field: syllabus[3].summary
    evidence: We employ machine learning to predict the sentiment of a review based
      on the words used in the review. We use logistic regression and evaluate its
      performance in a few different ways.
