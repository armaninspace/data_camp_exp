course_id: '24530'
course_title: Foundations of Probability in R
learning_outcomes:
- id: '1'
  claim: Describe and simulate the binomial distribution and its application to yes/no
    random events.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will learn about the binomial
    distribution, its behavior, and how to predict and simulate it, particularly in
    the context of coin flips and yes/no trials.
  citations:
  - field: syllabus[0].title
    evidence: The binomial distribution
  - field: syllabus[0].summary
    evidence: Here you'll learn about the binomial distribution, which describes the
      behavior of a combination of yes/no trials and how to predict and simulate its
      behavior.
- id: '2'
  claim: Combine probabilities of multiple events and confirm results using random
    simulations.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus indicates students will learn to combine probabilities (e.g.,
    both events happen, at least one happens) and confirm these with simulations,
    as well as learn properties of adding and multiplying random variables.
  citations:
  - field: syllabus[1].title
    evidence: Laws of probability
  - field: syllabus[1].summary
    evidence: In this chapter you'll learn to combine multiple probabilities, such
      as the probability two events both happen or that at least one happens, and
      confirm each with random simulations. You'll also learn some of the properties
      of adding and multiplying random variables.
- id: '3'
  claim: Apply Bayes' theorem to update beliefs about event fairness and support conclusions
    with simulations.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus states students will learn to apply Bayes' theorem to determine
    if a coin is fair or biased, and use simulations to support their conclusions.
  citations:
  - field: syllabus[2].title
    evidence: Bayesian statistics
  - field: syllabus[2].summary
    evidence: In this chapter, you'll learn to apply Bayes' theorem to draw conclusions
      about whether a coin is fair or biased, and back it up with simulations.
- id: '4'
  claim: Identify and describe the normal, Poisson, and geometric distributions as
    related to the binomial distribution.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.8
  reasoning: 'The syllabus indicates students will be introduced to three distributions
    related to the binomial: normal, Poisson, and geometric. The depth is limited
    to introduction and description.'
  citations:
  - field: syllabus[3].title
    evidence: Related distributions
  - field: syllabus[3].summary
    evidence: 'In this chapter we''ll introduce three more that are related to the
      binomial: the normal, the Poisson, and the geometric.'
coverage_notes:
