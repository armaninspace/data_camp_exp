course_id: '24534'
course_title: Introduction to Statistics in R
learning_outcomes:
- id: '1'
  claim: Identify and interpret key summary statistics (mean, median, standard deviation)
    for a dataset.
  knowledge_type: factual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will explore summary statistics
    including mean, median, and standard deviation, and learn how to interpret them.
  citations:
  - field: syllabus[0].summary
    evidence: In this chapter, you'll explore summary statistics including mean, median,
      and standard deviation, and learn how to accurately interpret them.
- id: '2'
  claim: Select appropriate summary statistics for different types of data.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus mentions developing critical thinking skills to choose the
    best summary statistics for your data, indicating analysis and conceptual understanding.
  citations:
  - field: syllabus[0].summary
    evidence: You'll also develop your critical thinking skills, allowing you to choose
      the best summary statistics for your data.
- id: '3'
  claim: Generate random samples and calculate probabilities for binary outcomes using
    the binomial distribution.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus states students will learn to generate random samples, calculate
    probability, and use the binomial distribution to model binary events.
  citations:
  - field: syllabus[1].summary
    evidence: You'll learn how to generate random samples and measure chance using
      probability... use the binomial distribution to model events with binary outcomes.
- id: '4'
  claim: Describe and visualize normal, Poisson, exponential, and t-distributions,
    and explain the central limit theorem.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus covers creating histograms for normal distributions, understanding
    the central limit theorem, and expanding knowledge to other distributions.
  citations:
  - field: syllabus[2].summary
    evidence: You’ll create histograms to plot normal distributions and gain an understanding
      of the central limit theorem, before expanding your knowledge of statistical
      functions by adding the Poisson, exponential, and t-distributions to your repertoire.
- id: '5'
  claim: Quantify and interpret the strength of linear relationships between variables
    using correlation.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus states students will learn how to quantify the strength
    of a linear relationship between two variables.
  citations:
  - field: syllabus[3].summary
    evidence: You'll learn how to quantify the strength of a linear relationship between
      two variables.
- id: '6'
  claim: Recognize the impact of confounding variables and study design on statistical
    analysis and conclusions.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: relational
  confidence: 0.85
  reasoning: The syllabus mentions exploring how confounding variables affect relationships
    and how study design influences results and reliability.
  citations:
  - field: syllabus[3].summary
    evidence: Explore how confounding variables can affect the relationship between
      two other variables. You'll also see how a study’s design can influence its
      results, change how the data should be analyzed, and potentially affect the
      reliability of your conclusions.
