course_id: '24539'
course_title: Statistical Simulation in Python
learning_outcomes:
- id: LO1
  claim: Understand and apply the basics of random variables and probability distributions
    in the context of simulation.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter covers a review of random variables and probability
    distributions, and introduces the simulation workflow, indicating students will
    understand and be able to apply these concepts in simple simulations.
  citations:
  - field: syllabus[0].summary
    evidence: We'll start with a review of random variables and probability distributions.
      We will then learn how to run a simulation by first looking at a simulation
      workflow and then recreating it in the context of a game of dice.
- id: LO2
  claim: Model and simulate basic probability scenarios and data generating processes.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The second chapter focuses on modeling the data generating process and
    simulating probability scenarios, including an eCommerce advertising simulation.
  citations:
  - field: syllabus[1].summary
    evidence: We'll look at a number of examples of modeling the data generating process
      and will conclude with modeling an eCommerce advertising simulation.
- id: LO3
  claim: Apply basic resampling methods (bootstrap, jackknife, permutation testing)
    for data analysis.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The third chapter introduces resampling methods and states that students
    will be able to start applying these methods for data analysis.
  citations:
  - field: syllabus[2].summary
    evidence: We will get a taste of bootstrap resampling, jackknife resampling, and
      permutation testing. After completing this chapter, students will be able to
      start applying simple resampling methods for data analysis.
- id: LO4
  claim: Use simulation techniques to solve business and financial problems, including
    Monte Carlo integration and power analysis.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The final chapter covers applying simulation to business planning, Monte
    Carlo integration, power analysis, and financial portfolio simulation, indicating
    students will be able to use these techniques in practical contexts.
  citations:
  - field: syllabus[3].summary
    evidence: We'll work through a business planning problem, learn about Monte Carlo
      Integration, Power Analysis with simulation and conclude with a financial portfolio
      simulation.
- id: LO5
  claim: Make decisions based on simulation results in simple scenarios.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.7
  reasoning: The first chapter mentions using simulations for making decisions, but
    does not specify the complexity or depth, so the claim is limited to simple scenarios.
  citations:
  - field: syllabus[0].summary
    evidence: Finally, we will learn how to use simulations for making decisions.
coverage_notes:
  syllabus_present: true
