course_id: '24548'
course_title: Advanced NLP with spaCy
learning_outcomes:
- id: '1'
  claim: Describe and utilize spaCy's core data structures for text processing.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter explicitly states that students will learn about spaCy's
    data structures and how to use them for predicting linguistic features, indicating
    conceptual understanding and some application.
  citations:
  - field: syllabus[0].title
    evidence: Finding words, phrases, names and concepts
  - field: syllabus[0].summary
    evidence: You'll learn about the data structures, how to work with statistical
      models, and how to use them to predict linguistic features in your text.
- id: '2'
  claim: Apply both rule-based and statistical approaches to extract information from
    large text corpora using spaCy.
  knowledge_type: procedural
  process_level: apply
  dok_level: 3
  solo_level: relational
  confidence: 0.9
  reasoning: The second chapter focuses on extracting information from large volumes
    of text and combining rule-based and statistical approaches, indicating procedural
    knowledge and relational understanding.
  citations:
  - field: syllabus[1].title
    evidence: Large-scale data analysis with spaCy
  - field: syllabus[1].summary
    evidence: You'll learn how to make the most of spaCy's data structures, and how
      to effectively combine statistical and rule-based approaches for text analysis.
- id: '3'
  claim: Explain and customize spaCy's processing pipeline, including writing custom
    components and attributes.
  knowledge_type: procedural
  process_level: apply
  dok_level: 3
  solo_level: relational
  confidence: 0.9
  reasoning: The third chapter covers understanding the processing pipeline, writing
    custom components, and adding custom attributes, which requires procedural knowledge
    and the ability to relate multiple concepts.
  citations:
  - field: syllabus[2].title
    evidence: Processing Pipelines
  - field: syllabus[2].summary
    evidence: You'll learn what goes on under the hood when you process a text, how
      to write your own components and add them to the pipeline, and how to use custom
      attributes to add your own meta data to the documents, spans and tokens.
- id: '4'
  claim: Train and update spaCy's statistical models for custom NLP tasks, including
    writing a training loop from scratch.
  knowledge_type: procedural
  process_level: apply
  dok_level: 3
  solo_level: relational
  confidence: 0.9
  reasoning: The fourth chapter explicitly states that students will learn to update
    models, write a training loop, and understand the basics of training, indicating
    procedural knowledge and relational understanding.
  citations:
  - field: syllabus[3].title
    evidence: Training a neural network model
  - field: syllabus[3].summary
    evidence: You'll learn how to update spaCy's statistical models to customize them
      for your use case – for example, to predict a new entity type in online comments.
      You'll write your own training loop from scratch, and understand the basics
      of how training works, along with tips and tricks that can make your custom
      NLP projects more successful.
