course_id: '24551'
course_title: Visualizing Time Series Data in Python
learning_outcomes:
- id: '1'
  claim: Produce and personalize basic line plots of time series data using Python.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn to use basic
    plotting tools in Python, annotate, and personalize time series plots, and produce
    compelling plots from static datasets.
  citations:
  - field: syllabus[0].title
    evidence: Line Plots
  - field: syllabus[0].summary
    evidence: You will learn how to leverage basic plottings tools in Python, and
      how to annotate and personalize your time series plots. By the end of this chapter,
      you will be able to take any static dataset and produce compelling plots of
      your data.
- id: '2'
  claim: Compute summary statistics and create aggregated visualizations to better
