course_id: '24561'
course_title: ARIMA Models in Python
learning_outcomes:
- id: LO1
  claim: Understand the concept of stationarity in time series and test for it visually
    and statistically.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus explicitly states that students will learn about stationarity,
    its importance for ARMA models, and how to test for it both visually and with
    a standard statistical test.
  citations:
  - field: syllabus[0].summary
    evidence: You'll learn about stationarity and how this is important for ARMA models.
      You'll learn how to test for stationarity by eye and with a standard statistical
      test.
- id: LO2
  claim: Describe and generate ARMA data and fit ARMA models.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus mentions learning the basic structure of ARMA models, generating
    ARMA data, and fitting an ARMA model.
  citations:
  - field: syllabus[0].summary
    evidence: you'll learn the basic structure of ARMA models and use this to generate
      some ARMA data and fit an ARMA model.
