  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus mentions using models to predict the uncertain future of
    stock prices.
  citations:
  - field: syllabus[1].summary
    evidence: Then you'll use your models to predict the uncertain future of stock
