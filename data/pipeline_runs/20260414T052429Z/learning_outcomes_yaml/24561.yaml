  claim: Fit ARMA, ARIMA, and ARMAX models using the statsmodels Python package.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus and overview both state that students will use statsmodels
