course_id: '24572'
course_title: Biomedical Image Analysis in Python
learning_outcomes:
- id: '1'
  claim: Load, build, and navigate N-dimensional biomedical images using Python libraries
    such as ImageIO, NumPy, and matplotlib.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will learn to load, build,
    and navigate N-dimensional images, and will use specific Python libraries for
    these tasks.
  citations:
  - field: syllabus[0].title
    evidence: Exploration
  - field: syllabus[0].summary
    evidence: learn how to load, build and navigate N-dimensional images using a CT
      image of the human chest. You'll also leverage the useful ImageIO package and
      hone your NumPy and matplotlib skills.
- id: '2'
  claim: Apply masks and convolutional filters to biomedical images to select sub-regions
    and detect features using SciPy's ndimage module.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus describes learning to exploit intensity patterns, use convolutional
    filters, and apply tools from SciPy's ndimage module.
  citations:
  - field: syllabus[1].title
    evidence: Masks and Filters
  - field: syllabus[1].summary
    evidence: exploit intensity patterns to select sub-regions of an array, and you'll
      use convolutional filters to detect interesting features. You'll also use SciPy's
      ndimage module
- id: '3'
  claim: Perform basic image segmentation, object labeling, and morphological measurement
    on biomedical images to analyze objects and extract measurements.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus mentions learning the fundamentals of image segmentation,
    object labeling, and morphological measurement, and applying these to a 4D cardiac
    time series.
  citations:
  - field: syllabus[2].title
    evidence: Measurement
  - field: syllabus[2].summary
    evidence: learn the fundamentals of image segmentation, object labeling, and morphological
      measurement
- id: '4'
  claim: Understand and perform basic image registration, resampling, and comparison
    to evaluate biomedical images, including assessing disease effects on brain structure.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The syllabus states students will learn the basics of registration, resampling,
