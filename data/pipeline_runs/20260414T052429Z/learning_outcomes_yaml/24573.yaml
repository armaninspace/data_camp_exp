course_id: '24573'
course_title: Hierarchical and Mixed Effects Models in R
learning_outcomes:
- id: LO1
  claim: Identify when to use hierarchical and mixed-effects models, and describe
    the components of a regression model.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter explicitly states that students will learn when to
    use mixed-effects models and the parts of a regression, indicating conceptual
    understanding and the ability to recognize appropriate contexts.
  citations:
  - field: syllabus[0].summary
    evidence: provides an example of when to use a mixed-effect and also describes
      the parts of a regression
- id: LO2
  claim: Apply linear mixed-effects models, including understanding different types
    of random effects and interpreting model results.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The second chapter covers introduction, types of random effects, understanding
    results, and statistical inference, suggesting students will be able to fit and
    interpret linear mixed-effects models.
  citations:
  - field: syllabus[1].summary
    evidence: introduction to linear mixed-effects models... covers different types
      of random-effects, describes how to understand the results... methods for statistical
      inference
- id: LO3
  claim: Extend linear mixed-effects modeling to generalized linear mixed-effects
    models for non-normal data, including binomial and count data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The third chapter discusses extending to generalized linear mixed-effects
    models, reviewing GLMs, and applying to binomial and count data, indicating procedural
    application to new data types.
  citations:
  - field: syllabus[2].summary
    evidence: extends linear mixed-effects models to include non-normal error terms...
      examines binomial data and count data in the context of mixed-effects models
- id: LO4
  claim: Analyze repeated measures data using both linear and generalized linear mixed-effects
    models, and relate repeated measures analysis to mixed-effects modeling.
  knowledge_type: procedural
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.85
  reasoning: The fourth chapter covers repeated measures as a special case of mixed-effects,
    reviews paired t-tests and ANOVA, and applies both linear and generalized linear
    mixed-effects models to real datasets, indicating the ability to analyze and relate
    concepts.
  citations:
  - field: syllabus[3].summary
    evidence: shows how repeated-measures analysis is a special case of mixed-effect
      modeling... uses a linear mixed-effect model to examine sleep study data...
      uses a generalized linear mixed-effect model to examine hate crime data
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The syllabus does not specify the depth of R programming skills required or taught,
    nor does it detail the extent of hands-on coding practice.
  - There is no explicit mention of model diagnostics, model selection, or advanced
    topics such as cross-validation or Bayesian approaches.
  - The course does not explicitly address metacognitive skills or the ability to
    create novel models beyond the provided examples.
