  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The fourth chapter states that students will learn to determine optimal
    portfolio weights in R, applying optimization techniques with constraints.
  citations:
  - field: syllabus[3].title
