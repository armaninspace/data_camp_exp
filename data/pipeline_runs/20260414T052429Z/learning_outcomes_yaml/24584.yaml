course_id: '24584'
course_title: Marketing Analytics in Google Sheets
learning_outcomes:
- id: LO1
  claim: Learners can apply data validation techniques in Google Sheets to ensure
    clean and organized data entry for marketing datasets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that learners will explore data validation
    options in Google Sheets and be able to create spreadsheets usable by multiple
    people without disorganization. This indicates procedural knowledge and the ability
    to apply these techniques.
  citations:
  - field: syllabus[0].title
    evidence: Data Validation for Clean Data Entry
  - field: syllabus[0].summary
    evidence: explore the data validation options that Google Sheets offers to aid
      in clean data entry... create spreadsheets that can be used by any number of
      people, without having to worry about disorganization.
- id: LO2
  claim: Learners can use regular expressions and related Google Sheets functions
    to reorganize and aggregate marketing campaign data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus details that learners will use REGEXMATCH(), REGEXREPLACE(),
    and REGEXEXTRACT() to manipulate strings for campaign data analysis, indicating
    procedural application.
  citations:
  - field: syllabus[1].title
    evidence: Regular Expressions
  - field: syllabus[1].summary
    evidence: learn to use regular expressions, along with Google Sheets' built-in
      functions REGEXMATCH(), REGEXREPLACE(), and REGEXEXTRACT(), to reorganize and
      aggregate data with ease.
- id: LO3
  claim: Learners can create and customize charts in Google Sheets to visualize and
    explain paid advertising data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus describes exploring and experimenting with chart editor
    settings to create informative and visually appealing charts, which is a procedural
    skill.
  citations:
  - field: syllabus[2].title
    evidence: Visualize the Data with Charts
  - field: syllabus[2].summary
    evidence: experiment with the chart editor settings to create both informative
      and visually appealing charts. You will learn to explain paid advertising data
      through visualizations.
- id: LO4
  claim: Learners can build a dynamic, filterable dashboard in Google Sheets to display
    paid advertising campaign data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The final chapter requires learners to build a dashboard that can be
    dynamically filtered by source and campaign name, demonstrating procedural application.
  citations:
  - field: syllabus[3].title
    evidence: Build a Paid Search Campaign Dashboard
  - field: syllabus[3].summary
    evidence: building a paid advertising dashboard that can be dynamically filtered
      by both source and campaign name.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not explicitly cover advanced analytical or evaluative skills
    (e.g., analyzing trends, making strategic recommendations) beyond dashboard creation
    and visualization.
  - There is no explicit mention of metacognitive or conceptual knowledge development,
    such as reflecting on the effectiveness of chosen methods or understanding broader
    marketing analytics frameworks.
  - The course appears focused on procedural skills within Google Sheets, with limited
    evidence of higher-order cognitive processes (e.g., analyze, evaluate, create
    in Bloom's Taxonomy beyond dashboard creation).
