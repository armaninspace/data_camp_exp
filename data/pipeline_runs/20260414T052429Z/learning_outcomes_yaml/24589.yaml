course_id: '24589'
course_title: RNA-Seq with Bioconductor in R
learning_outcomes:
- id: LO1
  claim: Understand the overall RNA-Seq workflow and its applications in identifying
    genes relevant to diseases or conditions.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The first chapter introduces the RNA-Seq workflow, its steps, and its
    significance, supporting conceptual understanding of the process and its applications.
  citations:
  - field: syllabus[0].title
    evidence: Introduction to RNA-Seq theory and workflow
  - field: syllabus[0].summary
    evidence: explore what we can do with RNA-Seq data and why it is exciting. We
      learn about the different steps and considerations involved in an RNA-Seq workflow.
  - field: overview
    evidence: RNA-Seq is an exciting next-generation sequencing method used for identifying
      genes and pathways underlying particular diseases or conditions.
- id: LO2
  claim: Apply quality control and exploratory data analysis techniques to RNA-Seq
    count data, including the use of heatmaps and principal component analysis to
    assess sample similarity and detect outliers.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second chapter describes performing quality control and exploratory
    analysis using specific visualization techniques, indicating procedural application.
  citations:
  - field: syllabus[1].title
    evidence: Exploratory data analysis
  - field: syllabus[1].summary
    evidence: perform quality control on the RNA-Seq count data using heatmaps and
      principal component analysis. We explore the similarity of the samples to each
      other and determine whether there are any sample outliers.
- id: LO3
  claim: Execute differential expression analysis using the DESeq2 R package to identify
    differentially expressed genes from RNA-Seq data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third chapter explicitly states that students will perform differential
    expression analysis with DESeq2, indicating procedural knowledge and application.
  citations:
  - field: syllabus[2].title
    evidence: Differential expression analysis with DESeq2
  - field: syllabus[2].summary
    evidence: execute the differential expression analysis, generate results and identify
      the differentially expressed genes.
  - field: overview
    evidence: The DESeq2 R package will be used to model the count data using a negative
      binomial model and test for differentially expressed genes.
- id: LO4
  claim: Visualize and interpret differential expression results using heatmaps and
    volcano plots, and summarize the RNA-Seq analysis workflow.
  knowledge_type: procedural
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The final chapter focuses on exploring and visualizing results, as well
    as reviewing and summarizing the workflow, supporting analysis and procedural
    knowledge.
  citations:
  - field: syllabus[3].title
    evidence: Exploration of differential expression results
  - field: syllabus[3].summary
    evidence: explore the differential expression results using visualizations, such
      as heatmaps and volcano plots. We also review the steps in the analysis and
      summarize the differential expression workflow with DESeq2.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not explicitly cover advanced interpretation of biological significance,
    integration with other data types, or troubleshooting complex experimental designs.
  - There is no explicit mention of assessment methods or depth of hands-on practice.
  - Metacognitive skills (e.g., reflecting on analysis choices) are not explicitly
    addressed.
