      window approaches.
- id: LO3
  claim: Evaluate GARCH model performance using statistical tests (p-values, t-statistics,
    ACF plot, Ljung-Box test) and model selection criteria (likelihood, information
    criteria).
  knowledge_type: procedural
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.9
  reasoning: The third chapter details the use of statistical tools and criteria for
    model evaluation and selection, which requires analytical skills and procedural
