- id: LO4
  claim: Describe and implement Poisson regression for modeling count data, including
    addressing overdispersion and visualizing model results.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The chapter on Modeling Count Data covers Poisson regression, overdispersion,
    and model visualization, indicating procedural application.
