  claim: Recall and explain the foundational concepts of linear models and how generalized
    linear models (GLMs) extend them for different types of response variables.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will review linear models
