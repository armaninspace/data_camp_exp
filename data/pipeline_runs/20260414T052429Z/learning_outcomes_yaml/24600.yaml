  claim: Apply the technical process of fitting generalized linear models in Python.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus mentions learning the technical process of fitting a GLM
