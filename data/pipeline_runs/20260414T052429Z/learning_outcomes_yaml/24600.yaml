- id: LO3
  claim: Describe and implement logistic regression for modeling binary data, including
    interpreting coefficients, performing inference, and assessing model performance.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The chapter on Modeling Binary Data covers logistic regression, model
    fitting, interpretation, inference, and performance assessment, indicating both
