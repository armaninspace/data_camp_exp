  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The final chapter focuses on increasing model complexity, handling multicollinearity,
    and working with categorical and interaction terms, indicating procedural application.
  citations:
