  claim: Describe fundamental concepts in social network analysis and basic network
    terminology (vertices, edges).
  knowledge_type: factual
  process_level: remember
  dok_level: 1
  solo_level: unistructural
  confidence: 0.75
  reasoning: The syllabus explicitly states that students are introduced to fundamental
