- id: LO3
  claim: Identify key relationships and influential vertices in directed networks
    using real-world data.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus describes learning to identify key relationships and influential
