- id: LO2
  claim: Use the igraph R package to explore, analyze, and visualize network data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The course overview and syllabus mention hands-on use of igraph for exploration,
