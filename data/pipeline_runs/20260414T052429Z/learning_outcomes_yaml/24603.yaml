course_id: '24603'
course_title: Working with Geospatial Data in Python
learning_outcomes:
- id: LO1
  claim: Understand the basic concepts of geospatial and vector data, and represent
    them in Python using GeoPandas.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first chapter introduces geospatial and vector data concepts and
    their representation in Python with GeoPandas, as well as basic reading, exploration,
    and visualization.
  citations:
  - field: syllabus[0].title
    evidence: Introduction to Geospatial Vector Data
  - field: syllabus[0].summary
    evidence: introduced to the concepts of geospatial data, and more specifically
      of vector data... represent such data in Python using the GeoPandas library,
      and the basics to read, explore and visualize such data.
- id: LO2
  claim: Apply spatial relationships and perform spatial queries and joins in Python.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The second chapter covers different spatial relationships and their use
    in Python for querying data and performing spatial joins.
  citations:
  - field: syllabus[1].title
    evidence: Spatial Relationships
  - field: syllabus[1].summary
    evidence: learn the different spatial relationships, and how to use them in Python
      to query the data or to perform spatial joins.
- id: LO3
  claim: Understand and handle coordinate reference systems (CRS) and perform geometric
    transformations in Python.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The third chapter focuses on CRS concepts, their importance, and practical
    handling in GeoPandas, as well as creating new geometries and overlaying datasets.
  citations:
  - field: syllabus[2].title
    evidence: Projecting and Transforming Geometries
  - field: syllabus[2].summary
    evidence: importance of those reference systems and how to handle it in practice
      with GeoPandas... create new geometries based on the spatial relationships,
      which will allow you to overlay spatial datasets.
- id: LO4
  claim: Integrate and apply geospatial data analysis techniques to real-world datasets
    using Python.
  knowledge_type: procedural
  process_level: apply
  dok_level: 3
  solo_level: relational
  confidence: 0.8
  reasoning: The final chapter involves applying all previously learned techniques
    to a new dataset, performing custom spatial operations, and being introduced to
    raster data, indicating integration and application in a novel context.
  citations:
  - field: syllabus[3].title
    evidence: Putting It All Together – Artisanal Mining Sites Case Study
  - field: syllabus[3].summary
    evidence: apply everything we have learnt up to now on a brand new dataset...
      learn some new spatial operations, how to apply custom spatial operations, and
      you will get a sneak preview into raster data.
- id: LO5
  claim: Visualize geospatial data, including creating choropleth maps, in Python.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: Visualization is mentioned in both the first and second chapters, with
    specific reference to choropleth visualizations in the second chapter.
  citations:
  - field: syllabus[0].summary
    evidence: visualize such data
  - field: syllabus[1].summary
    evidence: learn in more detail about choropleth visualizations
coverage_notes:
  syllabus_present: true
