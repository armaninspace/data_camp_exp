  claim: Distinguish between collaborative-filtering and content-based recommendation
    engines, and identify types of implicit and explicit data used in recommendation
    systems.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn distinctions
