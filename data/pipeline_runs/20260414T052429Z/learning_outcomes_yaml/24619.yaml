course_id: '24619'
course_title: Nonlinear Modeling with Generalized Additive Models (GAMs) in R
learning_outcomes:
- id: LO1
  claim: Understand the fundamental concepts and structure of Generalized Additive
    Models (GAMs), including their use of flexible, nonlinear functions.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The first chapter explicitly states that students will learn how GAMs
    work and how to use flexible, nonlinear functions to model data.
  citations:
  - field: syllabus[0].summary
    evidence: you will learn how Generalized additive models work and how to use flexible,
      nonlinear functions to model data without over-fitting.
- id: LO2
  claim: Apply the gam() function in the mgcv R package to build multivariate models
    that combine nonlinear, linear, and categorical effects.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The first chapter summary specifies practical use of the gam() function
    and building models with mixed effects.
  citations:
  - field: syllabus[0].summary
    evidence: You will learn to use the gam() function in the mgcv package, and how
      to build multivariate models that mix nonlinear, linear, and categorical effects
      to data.
- id: LO3
  claim: Interpret and explain the results of fitted GAMs, including visualizing the
    effects of variables on model outcomes.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: relational
  confidence: 0.9
  reasoning: The second chapter focuses on interpreting, explaining, and visualizing
    model results.
  citations:
  - field: syllabus[1].summary
    evidence: learn how to interpret and explain them. You will learn how to make
      plots that show how different variables affect model outcomes.
- id: LO4
  claim: Diagnose and iteratively address problems in GAMs, such as under-fitting
    and hidden relationships between variables.
  knowledge_type: procedural
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.85
  reasoning: The second chapter mentions diagnosing and fixing model problems, which
    requires analysis and iterative improvement.
  citations:
  - field: syllabus[1].summary
    evidence: diagnose problems in models arising from under-fitting the data or hidden
      relationships between variables, and how to iteratively fix those problems and
      get better results.
- id: LO5
  claim: Fit and visualize spatial GAMs with interactions, including modeling complex
    surfaces and interactions between different types of variables (e.g., space and
    time).
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The third chapter covers fitting spatial GAMs, modeling interactions,
    and visualizing complex surfaces.
  citations:
  - field: syllabus[2].summary
    evidence: fit models of geospatial data by using these interactions to model complex
      surfaces, and visualize those surfaces in 3D. Then you will learn about interactions
      between smooth and categorical variables, and how to model interactions between
      very different variables like space and time.
- id: LO6
  claim: Build and interpret logistic GAMs for classification tasks, including predicting
    binary outcomes and explaining variable influences.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The fourth chapter focuses on using GAMs for classification, building
    logistic GAMs, making predictions, and explaining influences.
  citations:
  - field: syllabus[3].summary
    evidence: build logistic GAMs to predict binary outcomes like customer purchasing
      behavior, learn to visualize this new type of model, make predictions, and learn
      how to explain the variables that influence each prediction.
