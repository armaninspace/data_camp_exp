course_id: '24621'
course_title: Spatial Analysis with sf and raster in R
learning_outcomes:
- id: LO1
  claim: Understand the use and advantages of the sf and raster packages for spatial
    analysis in R.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview and summary emphasize learning why the sf package is important
    and how it is used for spatial analysis, as well as the role of the raster package.
  citations:
  - field: overview
    evidence: In this course you will learn why the sf package is rapidly taking over
      spatial analysis in R.
  - field: summary
    evidence: Analyze spatial data using the sf and raster packages.
- id: LO2
  claim: Apply basic spatial data operations in R, including reading, manipulating,
    and analyzing vector and raster data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview lists specific operations such as reading spatial data,
    manipulating vectors, and working with rasters (aggregate, reclassify, crop, mask,
    extract).
  citations:
  - field: overview
    evidence: You will read in spatial data, manipulate vectors using the dplyr package
      and learn how to work with coordinate reference systems. You'll also learn how
      to perform geoprocessing of vectors including buffering, spatial joins, computing
      intersections, simplifying and measuring distance. With rasters, you will aggregate,
      reclassify, crop, mask, and extract.
