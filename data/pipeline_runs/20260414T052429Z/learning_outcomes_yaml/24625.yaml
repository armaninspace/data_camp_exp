      remove multicollinearity, and build an ensemble model.
- id: LO6
  claim: Develop and implement Python code (primarily using scikit-learn) to answer
    common machine learning interview questions.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview and summary emphasize practicing coding answers to interview
    questions using Python and scikit-learn.
  citations:
  - field: overview
    evidence: The coding examples will be mainly based on the scikit-learn package,
