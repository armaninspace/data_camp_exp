  - field: syllabus[0].summary
    evidence: you'll perform all the preprocessing steps required to create a predictive
      machine learning model, including what to do with missing values, outliers,
      and how to normalize your dataset.
- id: LO2
  claim: Apply data visualization techniques to explore and present datasets in the
