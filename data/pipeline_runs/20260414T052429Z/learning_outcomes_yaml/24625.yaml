  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second chapter summary lists these specific supervised learning techniques
    as practice topics.
  citations:
  - field: syllabus[1].summary
    evidence: practice different several aspects of supervised machine learning techniques,
      such as selecting the optimal feature subset, regularization to avoid model
      overfitting, feature engineering, and ensemble models to address the so-called
      bias-variance trade-off.
- id: LO4
  claim: Apply unsupervised learning methods, including dimensionality reduction,
