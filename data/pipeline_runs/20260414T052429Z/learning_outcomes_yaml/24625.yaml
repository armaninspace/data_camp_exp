  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third chapter focuses on applying unsupervised learning for feature
    extraction, dimensionality reduction, and clustering, including algorithm and
