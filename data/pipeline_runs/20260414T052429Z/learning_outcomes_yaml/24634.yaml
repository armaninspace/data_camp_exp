course_id: '24634'
course_title: Support Vector Machines in R
learning_outcomes:
- id: LO1
  claim: Recall and explain key concepts of support vector machines (SVMs), including
    linear separability and the role of kernels.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The course introduces key SVM concepts, linear separability, and kernel
    functions, with intuitive and visual explanations.
  citations:
  - field: syllabus[0].summary
    evidence: This chapter introduces some key concepts of support vector machines
      through a simple 1-dimensional example.
  - field: syllabus[2].summary
    evidence: Provides an introduction to polynomial kernels via a dataset that is
      radially separable... motivating an intuitive discussion of the kernel trick.
- id: LO2
  claim: Apply the SVM algorithm with linear, polynomial, and RBF kernels to datasets
