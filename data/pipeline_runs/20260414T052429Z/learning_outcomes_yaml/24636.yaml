    procedural application.
  citations:
  - field: syllabus[0].summary
    evidence: You will create a one-factor model of mental test abilities using the
      classic Holzinger and Swineford (1939) dataset.
  - field: syllabus[1].summary
    evidence: You will expand your skills in lavaan to creating multi-factor models...
      by creating multiple latent variables in the classic Holzinger and Swineford
      (1939) dataset.
- id: LO3
  claim: Troubleshoot common errors in SEM, such as Heywood cases, and create model
    diagrams using R tools.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus describes learning to troubleshoot Heywood cases and diagram
