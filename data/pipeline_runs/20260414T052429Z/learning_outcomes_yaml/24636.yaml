    and application.
  citations:
  - field: syllabus[0].summary
    evidence: You will learn important terminology, how to build, and run models.
- id: LO2
  claim: Apply lavaan in R to build and run one-factor and multi-factor structural
    equation models using real datasets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: Students are guided through creating one-factor and multi-factor models
