- id: LO4
  claim: Integrate SEM skills to analyze the structural properties of psychological
    scales (e.g., WAIS-III), including model creation, troubleshooting, and diagramming.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: relational
  confidence: 0.85
  reasoning: The final chapter requires students to use skills from previous chapters
    to create, troubleshoot, and diagram models for a new dataset (WAIS-III), indicating
