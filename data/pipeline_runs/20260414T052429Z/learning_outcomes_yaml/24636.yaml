course_id: '24636'
course_title: Structural Equation Modeling with lavaan in R
learning_outcomes:
- id: LO1
  claim: Understand and apply key terminology and concepts in structural equation
    modeling (SEM) using lavaan.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will learn important terminology
