course_id: '24640'
course_title: Introduction to Natural Language Processing in R
learning_outcomes:
- id: '1'
  claim: Identify and apply regular expressions and tokenization techniques to prepare
    text data for analysis in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus explicitly states that students will explore regular expressions
    and tokenization, and prepare and clean text for analysis. This supports procedural
    knowledge at the application level.
  citations:
  - field: syllabus[0].title
    evidence: True Fundamentals
  - field: syllabus[0].summary
    evidence: You will explore regular expressions and tokenization, two of the most
      common components of most analysis tasks. With regular expressions, you can
      search for any pattern you can think of, and with tokenization, you can prepare
      and clean text for more sophisticated analysis.
- id: '2'
  claim: Construct and utilize common text representations such as bag-of-words and
    TFIDF matrices, and compute cosine similarity between text samples.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus details learning to create a text corpus, bag-of-words,
    TFIDF matrices, and use cosine similarity, indicating procedural application of
    these representations.
  citations:
  - field: syllabus[1].title
    evidence: Representations of Text
  - field: syllabus[1].summary
    evidence: You will look at creating a text corpus, expanding a bag-of-words representation
      into a TFIDF matrix, and use cosine-similarity metrics to determine how similar
      two pieces of text are to each other.
- id: '3'
  claim: Perform basic text classification and topic modeling using R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus states that students will learn to perform classification
    modeling and topic modeling, which are procedural skills at the application level.
  citations:
  - field: syllabus[2].title
    evidence: 'Applications: Classification and Topic Modeling'
  - field: syllabus[2].summary
    evidence: This chapter teaches you how to perform both techniques and provides
      insight into how to approach these techniques from a practical point of you.
- id: '4'
  claim: Apply sentiment analysis and word embedding techniques to text data, and
    recognize advanced NLP concepts such as BERT, part-of-speech tagging, and named
    entity recognition.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The syllabus indicates students will learn to apply sentiment analysis
    and word embeddings, and briefly learn about BERT, POS tagging, and NER. The depth
    for advanced topics is likely introductory (recognition/awareness).
  citations:
  - field: syllabus[3].title
    evidence: Advanced Techniques
  - field: syllabus[3].summary
    evidence: We cover two staples of natural language processing, sentiment analysis,
      and word embeddings... you will briefly learn about BERT, part-of-speech tagging,
      and named entity recognition.
- id: '5'
  claim: Describe the fundamental workflow and techniques involved in natural language
    processing using R.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: multistructural
  confidence: 0.75
  reasoning: The course provides an overview of NLP skills and tools, and recaps the
    techniques covered, supporting conceptual understanding of the NLP workflow.
  citations:
  - field: summary
    evidence: Gain an overview of all the skills and tools needed to excel in Natural
      Language Processing in R.
  - field: syllabus[3].summary
    evidence: Chapter 4 ends by recapping all of the great techniques you will learn
      about in this course.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The depth of coverage for advanced topics (BERT, POS tagging, NER) is unclear
    and likely introductory.
  - No explicit mention of assessment or project work, so higher-order skills (analyze,
    evaluate, create) are not supported.
  - No explicit mention of metacognitive skills or reflection.
