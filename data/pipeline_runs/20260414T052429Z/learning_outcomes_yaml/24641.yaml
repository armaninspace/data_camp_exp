course_id: '24641'
course_title: Improving Query Performance in PostgreSQL
learning_outcomes:
- id: '1'
  claim: Understand and apply SQL joins, subqueries, and temporary tables to combine
    and manipulate data in PostgreSQL.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will learn how to join,
    subquery, and create temporary tables, which are procedural skills applied to
    data manipulation.
  citations:
  - field: syllabus[0].summary
    evidence: You will learn how to join, subquery, and create temporary tables while
      finding which Olympic athletes brave sub-freezing temperatures to train.
- id: '2'
  claim: Understand the function of the PostgreSQL query planner and use its insights
    to structure more efficient queries.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The course covers the query planner's functionality and how it can guide
    SQL structure for faster queries, indicating conceptual understanding and some
    application.
  citations:
  - field: syllabus[0].summary
    evidence: You will also learn about the query planner and how its functionality
      can guide your SQL structure to faster queries.
  - field: syllabus[3].summary
    evidence: Learn the lingo of the Query Lifecycle and dive into the query planner.
      Explore how the query planner creates and optimizes the query plan.
- id: '3'
  claim: Apply filtering, aggregation, and SQL order of operations to optimize query
    results and performance.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The syllabus mentions learning the SQL order of operations, filtering,
    and structuring queries for optimized aggregation, which are procedural skills.
  citations:
  - field: syllabus[1].summary
    evidence: learning the SQL order of operations... learning the best way to filter...
      how you can structure your query to optimize this process.
- id: '4'
  claim: Recognize and utilize database design properties such as views, storage structures,
    partitions, and indexes to improve query performance.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The syllabus covers understanding when a table is a view, the impact
    of storage structure, and using partitions and indexes, which are conceptual and
    procedural knowledge.
  citations:
  - field: syllabus[2].summary
    evidence: Discover when your table is not a table but a view. Learn how your database's
      storage structure (row or column oriented) impacts your query structure. ...using
      partitions and indexes to speed your queries.
- id: '5'
  claim: Analyze and assess query performance using the query planner and optimization
    techniques.
  knowledge_type: metacognitive
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.7
  reasoning: The syllabus describes exploring how the query planner creates and optimizes
    query plans, and fine-tuning optimization techniques, which involves analysis
    and metacognitive awareness of performance.
  citations:
  - field: syllabus[3].summary
    evidence: Explore how the query planner creates and optimizes the query plan.
      ... Fine tune your optimization techniques by seeing how different filters speed
      your query times.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The syllabus provides clear chapter-level summaries, but does not specify the
    depth of mastery or assessment methods.
  - No explicit mention of advanced query optimization (e.g., cost-based analysis,
    execution plan interpretation in detail).
  - No evidence of students creating novel optimization strategies (i.e., 'create'
    level on Bloom's).
  - No explicit coverage of troubleshooting or debugging poorly performing queries
    beyond general optimization.
