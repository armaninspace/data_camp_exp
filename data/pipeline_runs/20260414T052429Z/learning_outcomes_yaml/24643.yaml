course_id: '24643'
course_title: Intermediate Regression in R
learning_outcomes:
- id: '1'
  claim: Apply parallel slopes regression models in R using one numeric and one categorical
    explanatory variable.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will extend their linear
    regression skills to 'parallel slopes' regression with one numeric and one categorical
    explanatory variable, indicating procedural application.
  citations:
  - field: syllabus[0].title
    evidence: Parallel Slopes
  - field: syllabus[0].summary
    evidence: Extend your linear regression skills to 'parallel slopes' regression,
      with one numeric and one categorical explanatory variable.
- id: '2'
  claim: Understand and analyze the effects of interactions between explanatory variables,
    including Simpson's Paradox.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.85
  reasoning: The syllabus mentions exploring the effect of interactions and dealing
    with Simpson's Paradox, which requires analysis and conceptual understanding.
  citations:
  - field: syllabus[1].title
    evidence: Interactions
  - field: syllabus[1].summary
    evidence: Explore the effect of interactions between explanatory variables. Considering
      interactions allows for more realistic models that can have better predictive
      power. You'll also deal with Simpson's Paradox.
- id: '3'
  claim: Fit and implement multiple linear regression models in R with more than two
    explanatory variables.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus states students will fit multiple linear regression models
    and implement their own linear regression algorithm, indicating procedural application.
  citations:
  - field: syllabus[2].title
    evidence: Multiple Linear Regression
  - field: syllabus[2].summary
    evidence: See how modeling, and linear regression in particular, makes it easy
      to work with more than two explanatory variables. Once you've mastered fitting
      linear regression models, you'll get to implement your own linear regression
      algorithm.
- id: '4'
  claim: Fit and implement multiple logistic regression models in R, and understand
    the logistic distribution.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus indicates students will extend logistic regression to multiple
    variables, understand the logistic distribution, and implement their own algorithm,
    which is procedural and conceptual.
  citations:
  - field: syllabus[3].title
    evidence: Multiple Logistic Regression
  - field: syllabus[3].summary
    evidence: Extend your logistic regression skills to multiple explanatory variables.
      Understand the logistic distribution, which underpins this form of regression.
      Finally, implement your own logistic regression algorithm.
