course_id: '24647'
course_title: Visualizing Big Data with Trelliscope in R
learning_outcomes:
- id: LO1
  claim: Identify and describe general strategies for visualizing big data in R, including
    summary statistics, overplotting techniques, and faceting.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first syllabus chapter explicitly covers strategies for plotting
    big data, including summary statistics, overplotting, and faceting. The focus
    is on understanding and describing these concepts.
  citations:
  - field: syllabus[0].title
    evidence: General strategies for visualizing big data
  - field: syllabus[0].summary
    evidence: Learn different strategies for plotting big data using ggplot2, including
      calculating and plotting summary statistics, various techniques to deal with
      overplotting, and principles of small multiples with faceting, which leads into
      Trelliscope.
- id: LO2
  claim: Apply ggplot2 and TrelliscopeJS to create faceted visualizations for large,
    partitioned datasets in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The second syllabus chapter focuses on using ggplot2 and TrelliscopeJS
    to create faceted visualizations when data partitions are too numerous for a single
    screen, indicating procedural application.
  citations:
  - field: syllabus[1].title
    evidence: ggplot2 + TrelliscopeJS
  - field: syllabus[1].summary
    evidence: Now, using the trelliscopejs package with ggplot2, you will learn how
      to create faceted visualizations when the number of partitions in the data becomes
      too large to effectively view in a single screen.
- id: LO3
  claim: Explain the flexibility of TrelliscopeJS within the Tidyverse and specify
    cognostics for faceted plots.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The third syllabus chapter discusses the flexibility of TrelliscopeJS
    and the specification of cognostics, which are conceptual understandings.
  citations:
  - field: syllabus[2].title
    evidence: Trelliscope in the Tidyverse
  - field: syllabus[2].summary
    evidence: trelliscopejs also provides a faceted plotting mechanism that gives
      you much more flexibility in what plotting system you use and how to specify
      cognostics.
- id: LO4
  claim: Analyze and visualize large real-world datasets (e.g., Montreal BIXI bike
