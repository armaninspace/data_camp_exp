course_id: '24653'
course_title: Multivariate Probability Distributions in R
learning_outcomes:
- id: LO1
  claim: Summarize and visualize multivariate data using descriptive statistics and
    plotting techniques in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn to read, summarize,
    and plot multivariate data using descriptive statistics such as mean vector, variance-covariance,
    and correlation matrices, as well as plotting techniques.
  citations:
  - field: syllabus[0].title
    evidence: Reading and plotting multivariate data
  - field: syllabus[0].summary
    evidence: You will learn how to summarize multivariate data using descriptive
      statistics, such as the mean vector, variance-covariance, and correlation matrices.
      You'll then explore plotting techniques to provide insights into multivariate
      data.
- id: LO2
  claim: Generate random samples, calculate, and plot densities and probabilities
    for the multivariate normal distribution in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus specifies that students will learn to generate random samples,
    calculate, and plot densities and probabilities for the multivariate normal distribution.
  citations:
  - field: syllabus[1].title
    evidence: Multivariate Normal Distribution
  - field: syllabus[1].summary
    evidence: You will learn how to generate random samples from a multivariate normal
      distribution and how to calculate and plot the densities and probabilities under
      this distribution.
- id: LO3
  claim: Test datasets for multivariate normality.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.9
  reasoning: The syllabus mentions learning how to test if a dataset follows multivariate
    normality, which is a specific procedural skill.
  citations:
  - field: syllabus[1].summary
    evidence: You will also learn how to test if a dataset follows multivariate normality.
- id: LO4
  claim: Identify and model data using multivariate t-distributions and skew distributions.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The syllabus indicates students will be introduced to multivariate t-distributions
    and skew distributions for modeling non-normal data, suggesting conceptual understanding
    and basic modeling.
  citations:
  - field: syllabus[2].title
    evidence: Other Multivariate Distributions
  - field: syllabus[2].summary
    evidence: You will be introduced to multivariate t-distributions... You will be
