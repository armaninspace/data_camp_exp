- id: LO5
  claim: Implement principal component analysis (PCA) and multidimensional scaling
    (MDS) to analyze high-dimensional data in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus states students will be introduced to PCA and MDS and will
    learn to implement these techniques by analyzing data.
  citations:
  - field: syllabus[3].title
