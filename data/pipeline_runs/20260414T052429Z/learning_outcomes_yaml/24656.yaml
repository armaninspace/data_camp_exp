course_id: '24656'
course_title: Error and Uncertainty in Google Sheets
learning_outcomes:
- id: LO1
  claim: Define and distinguish between error, uncertainty, and risk in data analysis
    contexts.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.95
  reasoning: The first chapter explicitly focuses on terminology and types of error
    and uncertainty, indicating students will be able to define and distinguish these
    concepts.
  citations:
  - field: syllabus[0].title
    evidence: Defining error, uncertainty, and risk
  - field: syllabus[0].summary
    evidence: presents common terminology, introduces methods for determining significant
      differences between groups, and outlines the kinds of error and uncertainty
      involved
- id: LO2
  claim: Identify and evaluate threats to the validity and accuracy of conclusions
    drawn from data.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first and second chapters both mention identifying threats to validity
    and accuracy, suggesting students will be able to analyze data for such threats.
  citations:
  - field: syllabus[0].summary
    evidence: equip learners to identify threats to the validity and accuracy of their
      conclusions
  - field: syllabus[1].summary
    evidence: identify threats to the validity and accuracy of our predictions
- id: LO3
  claim: Apply basic and intermediate prediction methods (e.g., moving average, seasonal
    average, linear regression) to real-world datasets using Google Sheets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: The second chapter details the use of various prediction methods, including
    linear regression, and their application to student grades data.
  citations:
  - field: syllabus[1].title
    evidence: Making accurate predictions
  - field: syllabus[1].summary
    evidence: outlines both rudimentary (e.g., moving average, seasonal average, yearly
      average) and more complicated methods (e.g., linear regression) for making predictions
- id: LO4
  claim: Test assumptions underlying predictions and assess the impact of outliers
    and data distribution on prediction accuracy.
  knowledge_type: conceptual
  process_level: analyze
  dok_level: 2
  solo_level: multistructural
  confidence: 0.85
  reasoning: Chapter 3 focuses on testing assumptions, evaluating outliers, and the
    importance of normal distribution in predictions.
  citations:
  - field: syllabus[2].summary
    evidence: test the assumptions of their predictions...discuss the impact of outliers
      in prediction accuracy, evaluate the importance of normally distributed data
      in making predictions
- id: LO5
  claim: Employ consequence-likelihood matrices for risk management decisions.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.8
  reasoning: Chapter 3 mentions the use of consequence-likelihood matrices in risk
