- id: LO7
  claim: Integrate error and uncertainty analysis to make data-driven business decisions
    in a simulated scenario.
  knowledge_type: metacognitive
  process_level: create
  dok_level: 3
  solo_level: relational
  confidence: 0.85
  reasoning: The final chapter requires learners to synthesize previous lessons to
    make decisions about a bakery's menu, demonstrating integration and application
    in a novel context.
  citations:
  - field: syllabus[3].summary
    evidence: integrates all the previous lessons into a constructed-world scenario...figure
