course_id: '24666'
course_title: Introduction to Anomaly Detection in R
learning_outcomes:
- id: LO1
  claim: Identify outliers in data using numerical and graphical summaries, Grubbs'
    test, and the Seasonal-Hybrid ESD algorithm.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn to use numerical
    and graphical summaries, Grubbs' test, and the Seasonal-Hybrid ESD algorithm for
    outlier detection, indicating procedural knowledge and application.
  citations:
  - field: syllabus[0].title
    evidence: Statistical outlier detection
  - field: syllabus[0].summary
    evidence: learn how numerical and graphical summaries can be used to informally
      assess whether data contain unusual points. You'll use a statistical procedure
      called Grubbs' test to check whether a point is an outlier, and learn about
      the Seasonal-Hybrid ESD algorithm, which can help identify outliers when the
      data are a time series.
- id: LO2
  claim: Calculate k-nearest neighbors distance and local outlier factor to construct
    anomaly scores for multivariate data, and distinguish between local and global
    anomalies.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus details calculation of k-nearest neighbors distance and
    local outlier factor, and understanding the difference between local and global
    anomalies, supporting procedural application and multistructural understanding.
  citations:
  - field: syllabus[1].title
    evidence: Distance and density based anomaly detection
  - field: syllabus[1].summary
    evidence: learn how to calculate the k-nearest neighbors distance and the local
      outlier factor, which are used to construct continuous anomaly scores for each
      data point when the data have multiple features. You'll learn the difference
      between local and global anomalies and how the two algorithms can help in each
      case.
- id: LO3
  claim: Apply the isolation forest algorithm to detect anomalies in data by leveraging
    tree-based partitioning.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: unistructural
  confidence: 0.9
  reasoning: The syllabus states students will explore and use the isolation forest
    algorithm for anomaly detection, indicating procedural application, but does not
    specify integration with other methods.
  citations:
  - field: syllabus[2].title
    evidence: Isolation forest
  - field: syllabus[2].summary
    evidence: explore an alternative tree-based approach called an isolation forest,
      which is a fast and robust method of detecting anomalies that measures how easily
      points can be separated by randomly splitting the data into smaller and smaller
      regions.
- id: LO4
  claim: Compare the performance of different anomaly detection algorithms using precision
    and recall, and adapt algorithms for categorical data.
  knowledge_type: procedural
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.9
  reasoning: The syllabus indicates students will compare algorithm performance using
    precision and recall, and adapt algorithms for categorical features, which involves
    analysis and relational understanding.
  citations:
  - field: syllabus[3].title
    evidence: Comparing performance
  - field: syllabus[3].summary
    evidence: learn to compare the detection performance of the algorithms in instances
      where labeled anomalies are available. You'll learn to calculate and interpret
      the precision and recall statistics for an anomaly score, and how to adapt the
      algorithms so they can accommodate data with categorical features.
coverage_notes:
  syllabus_present: true
  evidence_strength: strong
  gaps_or_ambiguities:
  - The course does not specify the depth of theoretical understanding or the extent
    of practical implementation in R.
  - There is no explicit mention of metacognitive skills or the ability to create
    new anomaly detection methods.
  - The course appears to focus on application and comparison of existing algorithms
    rather than deeper analysis or synthesis.
