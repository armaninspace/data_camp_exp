course_id: '24670'
course_title: Network Analysis in the Tidyverse
learning_outcomes:
- id: '1'
  claim: Identify and compute basic centrality measures (degree, strength, betweenness,
    closeness) in network data using R and the tidyverse.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview explicitly states that students will compute degree and
    strength centrality, and touch on betweenness and closeness, using R and tidyverse
    tools.
  citations:
  - field: overview
    evidence: Then we will learn how to visualize it in different layouts using ggraph
      package. Later on, we will compute two basic yet important centrality measures
      in network science - degree and strength. We will use them to spot highly connected
      terrorists. We will finally touch two alternative centrality measures, betweenness
      and closeness.
- id: '2'
  claim: Visualize network data using R packages such as ggraph and visNetwork.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview mentions learning to visualize networks in different layouts
    with ggraph and creating interactive visualizations with visNetwork.
  citations:
  - field: overview
    evidence: Then we will learn how to visualize it in different layouts using ggraph
      package... Furthermore, we will explore the visNetwork package to produce fulfilling
      interactive network visualizations.
- id: '3'
  claim: Explain and apply the concept of betweenness centrality to identify influential
    ties in a network.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview describes using betweenness centrality to spot influential
    ties and visualize them, indicating understanding and application.
  citations:
  - field: overview
    evidence: We will use a centrality measure on ties, called betweenness, and will
      learn how to visualize the network highlighting connections with high betweenness
      centrality.
- id: '4'
  claim: Describe and provide evidence for the strength of weak ties theory in network
    analysis.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.6
  reasoning: The overview mentions providing evidence for Granovetter's theory of
    the strength of weak ties, suggesting students will understand and discuss this
    concept.
  citations:
  - field: overview
    evidence: Moreover, we will provide some alternative evidence regarding Mark Granovetter's
      theory of strength of weak ties, confirming that looser connections are crucial
      as demonstrated in the Madrid terrorism network.
- id: '5'
  claim: Use adjacency matrices to identify and visualize similar and dissimilar nodes
    in a network.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview states that students will use adjacency matrices to find
    and visualize similar and dissimilar pairs in the network.
  citations:
  - field: overview
    evidence: We will introduce the adjacency matrix as a mathematical representation
      of a network and use it to find terrorists with similar connection patterns.
      We will also learn how to visualize similar and dissimilar pairs of individuals
      using ggraph.
- id: '6'
  claim: Apply hierarchical clustering to discover groups of similar nodes in a network.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview describes using hierarchical clustering to find groups of
    similar nodes, building on previous concepts.
  citations:
  - field: overview
    evidence: We will explore hierarchical clustering to find groups of similar terrorists
      building on the notion of similarity of connection patterns developed in the
      previous chapter.
