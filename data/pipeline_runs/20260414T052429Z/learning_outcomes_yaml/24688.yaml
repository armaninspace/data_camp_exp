course_id: '24688'
course_title: Intermediate Interactive Data Visualization with plotly in R
learning_outcomes:
- id: LO1
  claim: Recall and apply key plotly commands to create and polish multiple static
    plot types in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus explicitly states that students will review key plotly commands,
    create multiple plot types, and polish charts. This indicates procedural knowledge
    and the ability to apply it to generate static visualizations.
  citations:
  - field: syllabus[0].title
    evidence: Introduction and review of plotly
  - field: syllabus[0].summary
    evidence: A review of key plotly commands. You will review how to create multiple
      plot types in plotly and how to polish your charts. Additionally, you will create
      static versions of the bubble and line charts that you will animate in the next
      chapter.
- id: LO2
  claim: Implement keyframe and cumulative animations in plotly, including animated
    bubble charts and time series visualizations.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus details learning to implement keyframe animation and create
    specific animated visualizations, such as Hans Rosling's bubble charts and cumulative
    animations of stock valuations.
  citations:
  - field: syllabus[1].title
    evidence: Animating graphics
  - field: syllabus[1].summary
    evidence: You will learn how to implement keyframe animation in plotly. You will
      explore how to create animations, such as Hans Rosling's bubble charts, as well
      as cumulative animations, such as an animation of a stock's valuation over time.
- id: LO3
  claim: Create interactive linked visualizations in plotly, enabling linked brushing
    and adding interactive controls such as dropdown menus, checkboxes, and sliders.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus specifies learning to link plotly charts for interactive
    exploration (linked brushing) and to add interactive controls, all without Shiny.
  citations:
  - field: syllabus[2].title
    evidence: Linking graphics
  - field: syllabus[2].summary
    evidence: You will learn how to link your plotly charts to enable linked brushing.
      Along the way, you will also learn how to add dropdown menus, checkboxes, and
      sliders to your plotly charts, without the need for Shiny.
- id: LO4
  claim: Apply plotly and data wrangling skills to analyze real-world data, specifically
    exploring orbital space launches using cumulative animations and the crosstalk
    package.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The case study chapter describes using the learned plotly techniques
    and data wrangling to explore a real dataset, including cumulative animations
    and the crosstalk package. The focus is on application rather than deeper analysis
    or creation.
  citations:
  - field: syllabus[3].title
    evidence: 'Case Study: Space launches'
  - field: syllabus[3].summary
    evidence: You will use your expanded plotly toolkit to explore orbital space launches
      between 1957 and 2018. Along the way, you'll learn how to wrangle data to enable
      cumulative animations without common starting points, and hone your understanding
      of the crosstalk package.
