    evidence: The lack of precision comes from sampling variability, which can be
      quantified using resampling and bootstrapping.
- id: '4'
  claim: Recognize and understand the implications of collinearity in statistical
    modeling and consider model improvement through data collection design.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.6
  reasoning: The overview mentions learning about collinearity and ways to improve
