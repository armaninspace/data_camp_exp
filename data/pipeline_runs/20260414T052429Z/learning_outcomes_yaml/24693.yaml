course_id: '24693'
course_title: Intermediate Statistical Modeling in R
learning_outcomes:
- id: '1'
  claim: Understand and apply effect size concepts, including for categorical response
    variables and interactions, in statistical models using R.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview describes learning about effect sizes, extending them to
    categorical responses, and using interactions in models. This suggests students
    will understand and apply these concepts, but does not provide evidence for deeper
    analysis or creation.
  citations:
  - field: overview
    evidence: Effect sizes were introduced in Part 1... you'll meet some high-level
      tools that make it easier to calculate and visualize effect sizes. You'll see
      how to extend the notion of effect size to models with a categorical response
      variable. And you'll start to use interactions in constructing models...
- id: '2'
  claim: Distinguish between total and partial change in model outputs and understand
    related concepts such as R-squared and degrees of freedom.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview explicitly mentions learning about total and partial change,
    R-squared, and degrees of freedom, indicating conceptual understanding but not
    necessarily application or analysis.
  citations:
  - field: overview
    evidence: 'You''ll also see an additional, but limited way of quantifying the
      extent to which the explanatory variables influence the response: R-squared.
      Finally, we''ll describe the notion of degrees of freedom, a way of describing
      the complexity of a model.'
- id: '3'
  claim: Understand the impact of sampling variability on model precision and use
    resampling and bootstrapping techniques in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview states that students will examine sampling variability and
    use resampling and bootstrapping, suggesting procedural knowledge and application.
  citations:
