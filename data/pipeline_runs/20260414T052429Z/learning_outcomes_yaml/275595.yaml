course_id: '275595'
course_title: Deep Learning for Text with PyTorch
learning_outcomes:
- id: LO1
  claim: Learners can preprocess and encode text data using techniques such as tokenization,
    stemming, stopword removal, and encoding methods in PyTorch.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn and implement
    text preprocessing and encoding techniques, and build a text processing pipeline.
  citations:
  - field: syllabus[0].summary
    evidence: Learn how to use PyTorch for text processing and get hands-on experience
      with techniques such as tokenization, stemming, stopword removal, and more.
      ... implement encoding techniques using PyTorch. ... building a text processing
      pipeline combining these techniques.
- id: LO2
  claim: Learners can develop and evaluate text classification models using CNNs and
    RNNs in PyTorch, including the use of word embeddings.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus details the implementation of CNNs and RNNs for text classification,
    use of word embeddings, and evaluation of models.
  citations:
  - field: syllabus[1].summary
    evidence: Apply your skills to implement word embeddings and develop both Convolutional
      Neural Networks (CNNs) and Recurrent Neural Networks (RNNs) for text classification
      using PyTorch, and understand how to evaluate your models using suitable metrics.
- id: LO3
  claim: Learners can implement and evaluate text generation models using RNNs, GANs,
    and pre-trained models in PyTorch.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The syllabus describes learning to use RNNs, GANs, and pre-trained models
    for text generation, and evaluating their performance.
  citations:
  - field: syllabus[2].summary
