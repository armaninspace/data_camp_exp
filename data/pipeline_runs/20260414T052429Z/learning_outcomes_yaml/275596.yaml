- id: LO7
  claim: Select appropriate testing methods and frameworks for a given Python programming
    context.
  knowledge_type: metacognitive
  process_level: analyze
  dok_level: 3
  solo_level: relational
  confidence: 0.75
  reasoning: The overview states that students will be able to choose suitable testing
    methods for specific contexts, which requires analysis and metacognitive skills.
  citations:
  - field: overview
    evidence: You will know the types of testing methods, and you will be able to
