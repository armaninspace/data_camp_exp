course_id: '275596'
course_title: Introduction to Testing in Python
learning_outcomes:
- id: LO1
  claim: Describe the purpose and importance of software testing in Python development.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: unistructural
  confidence: 0.75
  reasoning: The overview and summary emphasize understanding why testing is important
    and how it helps prevent errors in code.
  citations:
  - field: overview
    evidence: 'Why tests? ... How to decrease the possibility of getting into such
      a fiasco? ... The very simple answer is: write tests!'
  - field: summary
    evidence: 'Master Python testing: Learn methods, create checks, and ensure error-free
      code with pytest and unittest.'
- id: LO2
  claim: Identify and differentiate between basic types of software testing methods.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 1
  solo_level: multistructural
  confidence: 0.75
  reasoning: The course covers four types of software testing methods and aims for
    students to know and differentiate them.
  citations:
  - field: overview
    evidence: You will meet four types of software testing methods.
  - field: syllabus[2].summary
    evidence: Learn what the basic testing types are and their features. ... Finally,
      you will be able to differentiate the different testing types and create tests
      for each of them.
- id: LO3
  claim: Create and run basic tests in Python using the pytest framework.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The first syllabus chapter focuses on running tests with pytest, including
    using the CLI and handling failed/skipped tests.
  citations:
  - field: syllabus[0].title
    evidence: Creating Tests with pytest
  - field: syllabus[0].summary
    evidence: Learn what a test is and how to run the first one of your own with the
      pytest library! ... You will also learn how to process specific contexts, like
      'failed tests' and 'skipping the test' with pytest markers.
- id: LO4
  claim: Use pytest fixtures to simplify and structure test code, including setup
    and teardown processes.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second syllabus chapter is dedicated to understanding and using pytest
    fixtures, including teardown for preventing failures.
  citations:
  - field: syllabus[1].title
    evidence: Pytest Fixtures
  - field: syllabus[1].summary
    evidence: Learn what a fixture is and how to simplify your code by using it in
      tests. ... Finally, learn how to use teardowns to prevent software failures.
- id: LO5
  claim: Create and run tests for different testing types using pytest, including
    writing test functions and using the CLI.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third syllabus chapter covers creating test functions for different
    testing types and running them from the CLI.
  citations:
  - field: syllabus[2].summary
    evidence: You will get more skilled with creating test functions and running pytest
      from CLI in IDE exercises. ... create tests for each of them.
- id: LO6
  claim: Write and run tests using the unittest framework, including basic assertions
    and fixtures.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The final syllabus chapter introduces unittest, covering assertions,
