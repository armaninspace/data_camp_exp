course_id: '275597'
course_title: Developing R Packages
learning_outcomes:
- id: LO1
  claim: Understand and apply the essential structure and components of an R package,
    including directories and key files.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.9
  reasoning: The first syllabus chapter details learning about R package architecture,
    including the R and man directories, DESCRIPTION and NAMESPACE files, and using
    usethis to create a package skeleton.
  citations:
  - field: syllabus[0].title
    evidence: 'Creating R Packages: From Data to Functions'
  - field: syllabus[0].summary
    evidence: Dive into the essentials of R package construction, from understanding
      the architecture, the critical R and man directories, to the significance of
      the DESCRIPTION and NAMESPACE files.
- id: LO2
  claim: Apply best practices for writing and organizing R functions within a package.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.8
  reasoning: The first and second chapters mention strengthening R function writing
    skills, structuring code and functions, and best practices for package development.
  citations:
  - field: syllabus[0].summary
    evidence: Strengthen your R function writing skills, grasp best practices for
      package development, and get comfortable saving functions to a file.
  - field: syllabus[1].summary
    evidence: Discover effective strategies for structuring code and functions within
      the R directory.
- id: LO3
