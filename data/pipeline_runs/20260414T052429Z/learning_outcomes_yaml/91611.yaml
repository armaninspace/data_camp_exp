course_id: '91611'
course_title: Hypothesis Testing in Python
learning_outcomes:
- id: LO1
  claim: Understand the fundamental workflow and concepts of hypothesis testing, including
    z-scores, p-values, and error types.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The first syllabus chapter explicitly covers the workflow for a one-sample
    proportion test and introduces key concepts such as z-scores, p-values, and false
    negative/positive errors. This supports understanding of core hypothesis testing
    concepts.
  citations:
  - field: syllabus[0].title
    evidence: Hypothesis Testing Fundamentals
  - field: syllabus[0].summary
    evidence: walk through the workflow for a one sample proportion test... encounter
      important concepts like z-scores, p-values, and false negative and false positive
      errors
- id: LO2
  claim: Apply t-tests and ANOVA to test for differences in means between groups using
    Python.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The second syllabus chapter focuses on using t-tests for two groups and
    ANOVA for more than two groups, indicating procedural application of these tests.
  citations:
  - field: syllabus[1].title
    evidence: Two-Sample and ANOVA Tests
  - field: syllabus[1].summary
    evidence: test for differences in means between two groups using t-tests and extend
      this to more than two groups using ANOVA and pairwise t-tests
- id: LO3
  claim: Apply proportion tests and chi-square tests to analyze differences in proportions
    and categorical data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The third syllabus chapter covers proportion tests for two groups, chi-square
    independence tests for more than two groups, and chi-square goodness of fit tests,
    indicating procedural knowledge in applying these tests.
  citations:
  - field: syllabus[2].title
    evidence: Proportion Tests
  - field: syllabus[2].summary
    evidence: test for differences in proportions between two groups using proportion
      tests... extend your proportion tests to more than two groups with chi-square
      independence tests, and return to the one sample case with chi-square goodness
      of fit tests
- id: LO4
  claim: Understand the assumptions underlying parametric hypothesis tests and identify
    when to use non-parametric alternatives.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The fourth syllabus chapter discusses the assumptions of parametric tests
    and introduces non-parametric tests as alternatives, supporting conceptual understanding
    and identification.
  citations:
  - field: syllabus[3].title
    evidence: Non-Parametric Tests
  - field: syllabus[3].summary
    evidence: learn about the assumptions made by parametric hypothesis tests, and
      see how non-parametric tests can be used when those assumptions aren't met
- id: LO5
  claim: Use Python to perform common hypothesis tests on real-world datasets.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview and summary mention using Python to conduct hypothesis tests
    on real-world data, indicating procedural application in a practical context.
  citations:
  - field: overview
    evidence: you'll grow your Python analytical skills as you learn how and when
      to use common tests like t-tests, proportion tests, and chi-square tests. Working
      with real-world data...
  - field: summary
    evidence: Learn how and when to use common hypothesis tests like t-tests, proportion
      tests, and chi-square tests in Python.
