  claim: Construct and evaluate classification trees using R and the tidymodels framework.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.95
  reasoning: The syllabus explicitly states that students will learn to create decision
