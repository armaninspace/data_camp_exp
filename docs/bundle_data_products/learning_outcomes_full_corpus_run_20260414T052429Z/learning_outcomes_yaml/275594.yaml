  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The summary and overview both mention presenting results through visualizations
    and communicating findings to audiences regardless of statistical background.
  citations:
