course_id: '275594'
course_title: A/B Testing in R
learning_outcomes:
- id: '1'
  claim: Recall and describe the basic concepts and purposes of A/B testing.
  knowledge_type: factual
  process_level: remember
  dok_level: 1
  solo_level: unistructural
  confidence: 0.75
  reasoning: The summary and overview repeatedly emphasize learning the basics of
    A/B testing, including what questions A/B tests can address and their general
    purpose.
  citations:
  - field: summary
    evidence: Learn the basics of A/B testing in R, including how to design experiments,
      analyze data, predict outcomes, and present results through visualizations.
  - field: overview
    evidence: A/B testing is a common experimental design for human behavior research
      in industry and academia. A/B tests compare two variants to determine if the
      measurement shows different performance and if measurements vary in a meaningful
      way.
- id: '2'
  claim: Understand and explain how to design an A/B test, including considerations
    such as sample size and experimental questions.
  knowledge_type: conceptual
  process_level: understand
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview mentions learning about A/B test design, important considerations,
    and determining sample size, indicating conceptual understanding.
  citations:
  - field: overview
    evidence: You’ll learn what questions the A/B tests can address, the important
      considerations to be aware of in A/B tests, how to answer the questions at hand,
      and how to visualize the data. You’ll also learn how to determine the sample
      size needed in an experiment.
- id: '3'
  claim: Apply appropriate statistical tests (parametric and non-parametric) to analyze
    A/B test data in R.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.75
  reasoning: The overview lists specific tests (t-tests, Mann-Whitney U, Chi-Square,
    Fisher’s exact, Pearson and Spearman correlations) and states that students will
    learn to conduct analyses appropriate for the data and hypothesis.
  citations:
  - field: overview
    evidence: This course covers parametric and non-parametric A/B tests, such as
      t-tests, Mann-Whitney U test, Chi-Square test of independence, Fisher’s exact
      test, and Pearson and Spearman correlations.
- id: '4'
  claim: Conduct power analysis for A/B tests to determine experiment adequacy.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview explicitly mentions exploring power analysis for each test,
    indicating procedural application.
  citations:
  - field: overview
    evidence: Additionally, you’ll explore a power analysis for each test.
- id: '5'
  claim: Run linear and logistic regressions in R to predict outcomes based on data.
  knowledge_type: procedural
  process_level: apply
  dok_level: 2
  solo_level: multistructural
  confidence: 0.7
  reasoning: The overview states that students will learn to run linear and logistic
    regressions to predict outcomes, which is a procedural skill.
  citations:
  - field: overview
    evidence: You’ll also learn to run linear and logistic regressions to predict
      outcomes based on data and previous findings.
- id: '6'
  claim: Present A/B test results using data visualizations suitable for audiences
